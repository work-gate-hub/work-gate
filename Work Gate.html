/* ====== منظومة الأعمال — design tokens ====== */
:root{
  --green:#0E5A3C; --green-2:#0B4930; --green-3:#12744E; --green-soft:#E3EFE7;
  --navy:#14324F; --navy-soft:#E7EDF4;
  --amber:#C9822E; --amber-soft:#F7ECDC;
  --red:#B4372F; --red-soft:#F8E7E5;
  --paper:#F6F4EE; --card:#FFFFFF; --line:#E3DFD4; --line-2:#CFC9BA;
  --ink:#22271F; --ink-2:#5C6357; --ink-3:#8B9184;
  --ok:#177245;
  --r:14px; --r-s:9px;
  --shadow:0 1px 2px rgba(30,35,25,.06),0 6px 20px -8px rgba(30,35,25,.12);
  --side-w:248px;
  font-size:15.5px;
}
[data-theme="dark"]{
  --paper:#161B17; --card:#1F2620; --line:#333B33; --line-2:#465046;
  --ink:#ECEFE8; --ink-2:#AEB6AA; --ink-3:#7C847A;
  --green-soft:#1C3327; --navy-soft:#1D2A38; --amber-soft:#3A2F1C; --red-soft:#3B211E;
  --shadow:0 1px 2px rgba(0,0,0,.35),0 8px 24px -10px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Cairo',system-ui,'Segoe UI',Tahoma,sans-serif;background:var(--paper);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased}
button,input,select,textarea{font:inherit;color:inherit}
img,svg{display:block}
a{color:var(--green-3)}
::placeholder{color:var(--ink-3)}
:focus-visible{outline:2.5px solid var(--amber);outline-offset:2px;border-radius:4px}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}

/* ====== layout ====== */
#app{display:flex;min-height:100vh}
#sidebar{width:var(--side-w);flex-shrink:0;background:linear-gradient(178deg,var(--green-2),#083322 90%);color:#EAF3ED;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;z-index:30}
.brand{display:flex;align-items:center;gap:10px;padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.12)}
.brand .logo{width:40px;height:40px;border-radius:11px;background:var(--amber);display:grid;place-items:center;color:#fff;flex-shrink:0}
.brand b{font-weight:800;font-size:1.02rem;line-height:1.25;display:block}
.brand small{color:#B9D2C2;font-size:.72rem;font-weight:600}
#nav{flex:1;overflow-y:auto;padding:10px 10px 8px;scrollbar-width:thin}
.nav-item{display:flex;align-items:center;gap:11px;width:100%;text-align:start;background:none;border:0;color:#D6E6DB;padding:10px 12px;border-radius:10px;cursor:pointer;font-weight:700;font-size:.93rem;margin-bottom:2px;position:relative;transition:background .15s}
.nav-item svg{width:20px;height:20px;flex-shrink:0;opacity:.85}
.nav-item:hover{background:rgba(255,255,255,.08)}
.nav-item.on{background:rgba(255,255,255,.14);color:#fff}
.nav-item.on::before{content:"";position:absolute;inset-inline-start:-10px;top:9px;bottom:9px;width:4px;border-radius:0 4px 4px 0;background:var(--amber)}
.side-foot{padding:12px 14px;border-top:1px solid rgba(255,255,255,.12);font-size:.72rem;color:#9FBCAA}
.side-foot button{background:rgba(255,255,255,.1);border:0;color:#EAF3ED;border-radius:8px;padding:6px 10px;font-weight:700;cursor:pointer;font-size:.78rem;width:100%;margin-bottom:8px}
#main{flex:1;min-width:0;display:flex;flex-direction:column}
#topbar{display:flex;align-items:center;gap:12px;padding:14px 26px;border-bottom:1px solid var(--line);background:var(--card);position:sticky;top:0;z-index:20}
#topbar h1{font-size:1.22rem;font-weight:800;flex:1;display:flex;align-items:center;gap:10px}
#topbar h1::before{content:"";width:10px;height:26px;border-radius:3px;background:var(--green);display:inline-block}
.top-date{color:var(--ink-2);font-size:.85rem;font-weight:700}
.icon-btn{width:38px;height:38px;border-radius:10px;border:1px solid var(--line);background:var(--card);display:grid;place-items:center;cursor:pointer;color:var(--ink-2)}
.icon-btn:hover{border-color:var(--green);color:var(--green)}
.icon-btn svg{width:19px;height:19px}
#page{padding:22px 26px 90px;max-width:1240px;width:100%;margin:0 auto;animation:pgin .22s ease}
@keyframes pgin{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* ====== bottom nav (mobile) ====== */
#bottomnav{display:none}
@media(max-width:860px){
  #sidebar{display:none}
  #topbar{padding:12px 14px}
  #page{padding:16px 12px 96px}
  #bottomnav{display:flex;position:fixed;bottom:0;inset-inline:0;background:var(--card);border-top:1px solid var(--line);z-index:40;padding:6px 4px calc(6px + env(safe-area-inset-bottom))}
  #bottomnav button{flex:1;background:none;border:0;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.66rem;font-weight:800;color:var(--ink-3);cursor:pointer;padding:4px 0;border-radius:8px}
  #bottomnav button svg{width:22px;height:22px}
  #bottomnav button.on{color:var(--green)}
}

/* ====== cards / grids ====== */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:18px;margin-bottom:16px;position:relative}
.card.tabbed::after{content:"";position:absolute;top:16px;inset-inline-end:-1px;width:5px;height:34px;background:var(--tab,var(--green));border-radius:4px 0 0 4px}
.card h3{font-size:1rem;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.card h3 svg{width:19px;height:19px;color:var(--green-3)}
.grid{display:grid;gap:14px}
.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:1020px){.g4{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.g2,.g3,.g4{grid-template-columns:1fr 1fr}.g2{grid-template-columns:1fr}}

/* KPI — ledger totals signature: big Cairo 800 figure over a double rule */
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px 12px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi .lbl{font-size:.78rem;font-weight:800;color:var(--ink-2);display:flex;align-items:center;gap:7px}
.kpi .lbl svg{width:16px;height:16px;color:var(--kc,var(--green))}
.kpi .val{font-size:1.65rem;font-weight:800;letter-spacing:-.01em;padding-bottom:7px;border-bottom:3px double var(--line-2);margin:4px 0 6px;font-variant-numeric:tabular-nums;color:var(--kc,var(--ink));direction:ltr;text-align:end}
.kpi .sub{font-size:.72rem;color:var(--ink-3);font-weight:700}
.kpi::before{content:"";position:absolute;top:0;inset-inline-end:0;width:44px;height:44px;background:var(--kc,var(--green));opacity:.08;border-radius:0 0 0 100%}

/* ====== buttons ====== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:0;border-radius:10px;padding:9px 16px;font-weight:800;font-size:.9rem;cursor:pointer;background:var(--green);color:#fff;transition:filter .12s,transform .05s;text-decoration:none}
.btn svg{width:17px;height:17px}
.btn:hover{filter:brightness(1.08)}.btn:active{transform:scale(.98)}
.btn.amber{background:var(--amber)}.btn.navy{background:var(--navy)}.btn.red{background:var(--red)}
.btn.ghost{background:var(--card);color:var(--ink);border:1.5px solid var(--line-2)}
.btn.ghost:hover{border-color:var(--green);color:var(--green)}
.btn.soft{background:var(--green-soft);color:var(--green-2)}
[data-theme="dark"] .btn.soft{color:#BFE3CC}
.btn.sm{padding:6px 11px;font-size:.8rem;border-radius:8px}.btn.sm svg{width:14px;height:14px}
.btn.lg{padding:12px 22px;font-size:1rem}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-row{display:flex;gap:9px;flex-wrap:wrap;align-items:center}

/* ====== forms ====== */
.field{margin-bottom:12px}
.field label{display:block;font-size:.8rem;font-weight:800;color:var(--ink-2);margin-bottom:5px}
.inp,select.inp,textarea.inp{width:100%;border:1.5px solid var(--line-2);border-radius:10px;padding:9px 12px;background:var(--card);font-size:.93rem;font-weight:600;transition:border-color .12s}
.inp:focus{border-color:var(--green);outline:none}
textarea.inp{min-height:74px;resize:vertical}
.inp.num{direction:ltr;text-align:end;font-variant-numeric:tabular-nums}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:560px){.frow{grid-template-columns:1fr}}
.search-wrap{position:relative;flex:1;min-width:170px}
.search-wrap svg{position:absolute;inset-inline-start:11px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--ink-3)}
.search-wrap .inp{padding-inline-start:36px}
.toolbar{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.chip{border:1.5px solid var(--line-2);background:var(--card);border-radius:999px;padding:5px 13px;font-size:.8rem;font-weight:800;cursor:pointer;color:var(--ink-2);white-space:nowrap}
.chip.on{background:var(--green);border-color:var(--green);color:#fff}
.chips{display:flex;gap:7px;flex-wrap:wrap}
.switch{position:relative;width:42px;height:24px;flex-shrink:0}
.switch input{opacity:0;width:100%;height:100%;position:absolute;cursor:pointer;z-index:2;margin:0}
.switch i{position:absolute;inset:0;background:var(--line-2);border-radius:99px;transition:.15s}
.switch i::after{content:"";position:absolute;top:3px;inset-inline-start:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.15s}
.switch input:checked+i{background:var(--green)}
.switch input:checked+i::after{transform:translateX(-18px)}
[dir="ltr"] .switch input:checked+i::after{transform:translateX(18px)}
.check-row{display:flex;align-items:center;gap:10px;font-weight:700;font-size:.88rem;margin-bottom:10px}

/* ====== tables — ruled like a paper ledger ====== */
.tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r-s);background:var(--card)}
table.tbl{width:100%;border-collapse:collapse;font-size:.89rem;min-width:560px}
.tbl th{background:var(--green);color:#fff;font-weight:800;padding:9px 10px;text-align:center;white-space:nowrap;position:sticky;top:0;font-size:.83rem}
.tbl.navy th{background:var(--navy)}
.tbl td{padding:8px 10px;border-bottom:1px solid var(--line);text-align:center;vertical-align:middle}
.tbl tr:nth-child(even) td{background:color-mix(in srgb,var(--paper) 45%,transparent)}
.tbl tr:hover td{background:var(--green-soft)}
.tbl td.st{text-align:start;font-weight:700}
.tbl .num{direction:ltr;font-variant-numeric:tabular-nums;white-space:nowrap}
.tbl tfoot td{background:var(--navy-soft)!important;font-weight:800;border-top:2px solid var(--line-2)}
.tbl .inp{padding:6px 8px;border-radius:7px;min-width:78px}
.tbl input.inp{max-width:110px;margin:0 auto}
.row-act{display:flex;gap:5px;justify-content:center}
.row-act .icon-btn{width:30px;height:30px;border-radius:8px}
.row-act .icon-btn svg{width:15px;height:15px}
.badge{display:inline-block;border-radius:999px;padding:2px 11px;font-size:.74rem;font-weight:800}
.badge.g{background:var(--green-soft);color:var(--green-2)}
.badge.r{background:var(--red-soft);color:var(--red)}
.badge.a{background:var(--amber-soft);color:#8a5a1d}
.badge.n{background:var(--navy-soft);color:var(--navy)}
[data-theme="dark"] .badge.g{color:#9fd8b4}[data-theme="dark"] .badge.r{color:#f0a49d}[data-theme="dark"] .badge.a{color:#ecc287}[data-theme="dark"] .badge.n{color:#9fbede}
.money-pos{color:var(--ok);font-weight:800}.money-neg{color:var(--red);font-weight:800}
.tel{direction:ltr;unicode-bidi:embed;font-variant-numeric:tabular-nums;text-decoration:none;color:var(--green-3);font-weight:700}

/* ====== empty state ====== */
.empty{text-align:center;padding:44px 16px;color:var(--ink-2)}
.empty svg{width:52px;height:52px;margin:0 auto 12px;color:var(--line-2)}
.empty b{display:block;font-size:1.02rem;color:var(--ink);margin-bottom:4px}
.empty p{font-size:.85rem;margin-bottom:14px}

/* ====== modal ====== */
#modal-root:not(:empty){position:fixed;inset:0;z-index:100;display:grid;place-items:center;padding:16px;background:rgba(15,25,18,.55);backdrop-filter:blur(2px);animation:pgin .15s}
.modal{background:var(--card);border-radius:16px;width:min(620px,100%);max-height:92vh;display:flex;flex-direction:column;box-shadow:0 24px 60px -12px rgba(0,0,0,.4)}
.modal.wide{width:min(860px,100%)}
.modal-h{display:flex;align-items:center;gap:10px;padding:15px 20px;border-bottom:1px solid var(--line)}
.modal-h b{flex:1;font-size:1.05rem;font-weight:800}
.modal-b{padding:18px 20px;overflow-y:auto}
.modal-f{padding:13px 20px;border-top:1px solid var(--line);display:flex;gap:9px;justify-content:flex-start;flex-wrap:wrap}
@media(max-width:600px){#modal-root:not(:empty){align-items:end;padding:0}.modal{border-radius:18px 18px 0 0;max-height:94vh}}

/* ====== toast ====== */
#toast-root{position:fixed;bottom:20px;inset-inline-start:50%;transform:translateX(50%);z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
[dir="ltr"] #toast-root{transform:translateX(-50%)}
.toast{background:var(--navy);color:#fff;border-radius:11px;padding:10px 18px;font-weight:800;font-size:.88rem;box-shadow:var(--shadow);display:flex;gap:9px;align-items:center;animation:tin .2s ease}
.toast.ok{background:var(--green)}.toast.err{background:var(--red)}
.toast svg{width:17px;height:17px}
@keyframes tin{from{opacity:0;transform:translateY(10px)}to{opacity:1}}

/* ====== assistant chat ====== */
.chat-box{display:flex;flex-direction:column;gap:10px;max-height:430px;overflow-y:auto;padding:4px 2px;margin-bottom:12px}
.msg{max-width:85%;padding:10px 14px;border-radius:14px;font-size:.9rem;white-space:pre-wrap;line-height:1.6}
.msg.u{align-self:flex-start;background:var(--green);color:#fff;border-end-start-radius:4px}
.msg.b{align-self:flex-end;background:var(--navy-soft);border-end-end-radius:4px}
[dir="ltr"] .msg.u{align-self:flex-end}[dir="ltr"] .msg.b{align-self:flex-start}
.insight{display:flex;gap:11px;padding:12px 13px;border:1px solid var(--line);border-radius:11px;margin-bottom:9px;background:var(--card)}
.insight .ic{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;flex-shrink:0}
.insight .ic svg{width:19px;height:19px}
.insight b{display:block;font-size:.88rem}
.insight p{font-size:.82rem;color:var(--ink-2)}
.insight.warn .ic{background:var(--red-soft);color:var(--red)}
.insight.good .ic{background:var(--green-soft);color:var(--green-2)}
.insight.info .ic{background:var(--amber-soft);color:var(--amber)}

/* misc */
.muted{color:var(--ink-2);font-size:.83rem}
.hint{font-size:.78rem;color:var(--ink-3);font-weight:600}
.divider{height:1px;background:var(--line);margin:16px 0}
.tag-note{background:var(--amber-soft);border:1px solid #e5cfa8;border-radius:10px;padding:10px 13px;font-size:.83rem;font-weight:600;margin-bottom:13px}
[data-theme="dark"] .tag-note{border-color:#5d4a26}
.chart-box{position:relative;height:280px}
.chart-box.sm{height:220px}
.kv{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px dashed var(--line);font-size:.88rem}
.kv b{font-variant-numeric:tabular-nums;direction:ltr}
.help-sec h4{margin:18px 0 6px;font-size:.98rem;color:var(--green-2)}
[data-theme="dark"] .help-sec h4{color:#9fd8b4}
.help-sec p,.help-sec li{font-size:.89rem;color:var(--ink-2);margin-bottom:6px}
.help-sec ol,.help-sec ul{padding-inline-start:22px}
.kbd{background:var(--navy-soft);border:1px solid var(--line-2);border-radius:6px;padding:1px 7px;font-size:.8rem;font-weight:800;white-space:nowrap}

/* ====== print ====== */
#print-root{display:none}
@media print{
  @page{size:A4;margin:11mm}
  body.printing #app,body.printing #toast-root,body.printing #modal-root,body.printing #bottomnav{display:none!important}
  body.printing #print-root{display:block}
  #print-root{font-size:12.5px;color:#000}
  .p-head{text-align:center;margin-bottom:10px}
  .p-head h2{font-size:19px;margin-bottom:2px}
  .p-head .p-sub{font-size:13px;color:#333;display:flex;justify-content:space-between;border-bottom:2.5px solid #14324F;padding-bottom:6px;margin-top:6px;font-weight:700}
  .p-title{background:#14324F;color:#fff;text-align:center;font-weight:800;font-size:15px;padding:6px;border:1px solid #14324F}
  table.p-tbl{width:100%;border-collapse:collapse}
  .p-tbl th{background:#14324F;color:#fff;padding:5px 6px;border:1px solid #444;font-size:12px}
  .p-tbl.green th{background:#0E5A3C}
  .p-tbl td{border:1px solid #777;padding:4.5px 6px;text-align:center}
  .p-tbl td.st{text-align:right}
  [dir="ltr"] .p-tbl td.st{text-align:left}
  .p-tbl tfoot td{background:#E7EDF4;font-weight:800;border-top:2px solid #14324F}
  .p-tbl .num{direction:ltr;font-variant-numeric:tabular-nums}
  .p-foot{margin-top:14px;display:flex;justify-content:space-between;font-weight:700;font-size:12px}
  tr{page-break-inside:avoid}
}

/* ====== login screen ====== */
.login-screen{position:fixed;inset:0;z-index:999;background:linear-gradient(168deg,var(--paper) 30%,#E7E2D4);display:grid;place-items:center;padding:18px}
[data-theme="dark"] .login-screen{background:linear-gradient(168deg,#141a15 30%,#0d120e)}
.login-card{background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:32px 28px 26px;width:min(400px,100%);text-align:center;animation:pgin .25s ease}
.login-card .lg-logo{width:58px;height:58px;border-radius:17px;background:var(--green);color:#fff;display:grid;place-items:center;margin:0 auto 12px}
.login-card .lg-logo svg{width:28px;height:28px}
.login-card h2{font-size:1.18rem;font-weight:800;margin-bottom:2px}
.login-card .muted{margin-bottom:6px}
.login-card .field{text-align:start;margin-top:13px}
.lg-err{color:var(--red);font-weight:800;font-size:.85rem;margin-top:10px}
.login-card .btn{margin-top:16px;width:100%}
@keyframes lgshake{0%,100%{transform:none}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.shake{animation:lgshake .3s}
/* ====== responsive polish ====== */
.dash-2col{grid-template-columns:1.5fr 1fr}
@media(max-width:860px){.dash-2col{grid-template-columns:1fr}}
.cxw-row{display:grid;grid-template-columns:30px 1.3fr 1fr 1.3fr 38px;gap:8px;margin-bottom:8px;align-items:center}
@media(max-width:640px){
 .cxw-row{grid-template-columns:26px 1fr 1fr 34px;row-gap:5px}
 .cxw-row>.icon-btn{grid-column:4;grid-row:1}
 .cxw-row .cxw-extra{grid-column:1/-1}
 .top-date{display:none}
}

/* ====== signature watermark ====== */
.madeby{position:fixed;bottom:8px;left:10px;z-index:5;font-size:.68rem;font-weight:700;color:var(--ink-3);opacity:.55;pointer-events:none;letter-spacing:.02em;direction:ltr}
@media(max-width:860px){.madeby{display:none}}
.madeby-lg{margin-top:16px;font-size:.7rem;color:var(--ink-3);opacity:.75;direction:ltr}
@media print{.p-madeby{margin-top:16px;text-align:center;font-size:9.5px;color:#888;direction:ltr}}

/* ====== section-creator pickers ====== */
.chip svg{width:16px;height:16px}
.icon-pick{display:grid;grid-template-columns:repeat(auto-fill,minmax(48px,1fr));gap:8px}
.icon-tile{height:48px;border:1.5px solid var(--line-2);border-radius:12px;background:var(--card);display:grid;place-items:center;cursor:pointer;color:var(--ink-2);transition:all .12s;position:relative}
.icon-tile svg{width:22px;height:22px}
.icon-tile:hover{border-color:var(--green);color:var(--green)}
.icon-tile.on{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 3px 10px -3px rgba(14,90,60,.5)}
.icon-tile.on::after{content:"✓";position:absolute;top:-7px;inset-inline-end:-5px;width:18px;height:18px;border-radius:50%;background:var(--amber);color:#fff;font-size:.68rem;font-weight:800;display:grid;place-items:center}
.tpl-card{border:1.5px solid var(--line-2);border-radius:12px;padding:11px 14px;margin-bottom:8px;cursor:pointer;transition:all .12s;display:flex;flex-direction:column;gap:2px;position:relative}
.tpl-card b{font-size:.92rem}
.tpl-card p{font-size:.78rem;color:var(--ink-2);margin:0}
.tpl-card:hover{border-color:var(--green)}
.tpl-card.on{border-color:var(--green);background:var(--green-soft)}
.tpl-card.on::before{content:"✓";position:absolute;top:10px;inset-inline-start:12px;width:20px;height:20px;border-radius:50%;background:var(--green);color:#fff;font-size:.75rem;font-weight:800;display:grid;place-items:center}
.tpl-card.on b,.tpl-card.on p{padding-inline-start:28px}

</style>
</head>

 <aside id="sidebar">
  <div class="brand"><div class="logo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22" stroke-linecap="round" stroke-linejoin="round"><path d="M4 10v10h16V10"/><path d="M2 10l2-6h16l2 6c0 1.4-1.3 2.5-2.9 2.5S16.3 11.4 16.3 10c0 1.4-1.4 2.5-3 2.5-1.5 0-2.8-1-3-2.3-.2 1.3-1.5 2.3-3 2.3-1.6 0-3-1.1-3.3-2.5Z"/><path d="M9 20v-5h6v5"/></svg></div>
   <div><b id="brand-name">منظومة الأعمال</b><small id="brand-tag"></small></div></div>

 <main id="main">

   <button class="icon-btn" id="tb-lang" title="AR / EN"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="19" height="19" stroke-linecap="round"><circle cx="12" cy="12" r="9.5"/><path d="M2.5 12h19M12 2.5c2.7 2.6 4 5.9 4 9.5s-1.3 6.9-4 9.5c-2.7-2.6-4-5.9-4-9.5s1.3-6.9 4-9.5Z"/></svg></button>

 </main>
</div>

function seedProducts(){const P=[["كاندي","ctn",200],["مارشميلو","ctn",300],["مقرمشات","bag",200],["لب عباد","bag",50],["لب سوبر","bag",50],["لب كوسه","bag",50],["سوداني لبناني","bag",50],["سوداني شوكلاته","bag",50],["شوكوين","bag",50],["سوداني بالسمسم والعسل","bag",50],["سوداني مقرمش","bag",0],["ذره أسباني","bag",0],["شوكلاته حجر","ctn",0],["لبان","ctn",750],["شوكلاته","ctn",1000],["ملبس","bag",50],["لبان عبد المولي","ctn",950]];
 return P.map(([n,u,p])=>({id:uid(),name:n,unit:u,price:p,cost:0,stock:0,min:10,active:true}));}
function seedRoutes(){return["بهنباي","كرايس","فرغان","ديرب نجم","شيبة","الزنكلون","مهدي","صفط","الاسدية","دويدة","كفر ابراهيم","ابو متنا","ميت الغماري","إكوة","كفر الباشا"].map(n=>({id:uid(),name:n}));}
function freshDB(){return{meta:{v:1,created:todayISO(),onboarded:false,lastBackup:null,savedAt:0},settings:{biz:"",lang:"ar",theme:"light",currency:"ج.م",pin:"",aiKey:"",aiModel:"claude-haiku-4-5-20251001",navNames:{},gistToken:"",gistId:"",syncPass:"",auth:{u:"MASTER",h:hashPw("Master@123")}},products:seedProducts(),routes:seedRoutes(),customers:[],transactions:[],invoices:[],moves:[],custom:[]};}
function loadDB(){try{const raw=localStorage.getItem(DB_KEY);if(raw){db=JSON.parse(raw);["products","routes","customers","transactions","invoices","moves","custom"].forEach(k=>{if(!Array.isArray(db[k]))db[k]=[]});db.settings=Object.assign(freshDB().settings,db.settings||{});db.meta=Object.assign(freshDB().meta,db.meta||{});return}}catch(e){console.warn("db load",e)}db=freshDB();}
function save(){try{localStorage.setItem(DB_KEY,JSON.stringify(db))}catch(e){toast(LANG==="ar"?"مساحة التخزين ممتلئة — نزّل نسخة احتياطية":"Storage full — download a backup","err")}}
const P_get=id=>db.products.find(p=>p.id===id);
const R_get=id=>db.routes.find(r=>r.id===id);
const R_name=id=>{const r=R_get(id);return r?r.name:t("c_no_route")};
const C_get=id=>db.customers.find(c=>c.id===id);
function balances(){const m={};db.customers.forEach(c=>m[c.id]=num(c.opening));db.transactions.forEach(x=>{if(m[x.customerId]===undefined)return;m[x.customerId]+=x.type==="debt"?num(x.amount):-num(x.amount)});return m;}
function calcBal(cid){const c=C_get(cid);if(!c)return 0;let b=num(c.opening);db.transactions.forEach(x=>{if(x.customerId===cid)b+=x.type==="debt"?num(x.amount):-num(x.amount)});return b;}
function invTotals(inv){let vout=0,vret=0,inc=0,qout=0,qret=0;(inv.lines||[]).forEach(l=>{const p=num(l.price);vout+=p*num(l.out);vret+=p*num(l.ret);inc+=p*(num(l.out)-num(l.ret));qout+=num(l.out);qret+=num(l.ret)});return{vout,vret,inc,qout,qret,net:qout-qret};}
function applyInvStock(inv,sign){if(!inv.stockApplied)return;(inv.lines||[]).forEach(l=>{const p=P_get(l.pid);if(p)p.stock=num(p.stock)-sign*(num(l.out)-num(l.ret))});}
function addMove(pid,type,qty,note,date){db.moves.push({id:uid(),date:date||todayISO(),pid,type,qty:num(qty),note:note||""});}

/* ---------- UI kit ---------- */
function toast(msg,kind){const r=byId("toast-root");const d=document.createElement("div");d.className="toast "+(kind||"ok");d.innerHTML=(kind==="err"?ic("alert"):ic("check"))+"<span>"+esc(msg)+"</span>";r.appendChild(d);setTimeout(()=>d.remove(),2800);}
function modal(html,wide){const r=byId("modal-root");r.innerHTML=`<div class="modal ${wide?"wide":""}" role="dialog" aria-modal="true">${html}</div>`;r.onclick=e=>{if(e.target===r)closeModal()};const f=r.querySelector("input,select,textarea,button");if(f)setTimeout(()=>f.focus(),60);}
function closeModal(){byId("modal-root").innerHTML="";}
function mhead(title,icon){return`<div class="modal-h">${icon?`<span style="color:var(--green-3)">${ic(icon)}</span>`:""}<b>${esc(title)}</b><button class="icon-btn" onclick="closeModal()" aria-label="${t("close")}">${ic("x")}</button></div>`;}
function confirmBox(title,body,onyes,danger){modal(`${mhead(title,"alert")}<div class="modal-b"><p style="font-size:.92rem">${esc(body)}</p></div><div class="modal-f"><button class="btn ${danger?"red":""}" id="cf-y">${t("yes")}</button><button class="btn ghost" onclick="closeModal()">${t("cancel")}</button></div>`);byId("cf-y").onclick=()=>{closeModal();onyes()};}
function askPin(then){if(!db.settings.pin)return then();modal(`${mhead(t("st_pin_ask"),"lock")}<div class="modal-b"><input class="inp num" id="pin-in" type="password" inputmode="numeric" autocomplete="off"></div><div class="modal-f"><button class="btn" id="pin-ok">${t("confirm")}</button><button class="btn ghost" onclick="closeModal()">${t("cancel")}</button></div>`);const go=()=>{if(byId("pin-in").value===db.settings.pin){closeModal();then()}else toast(t("st_pin_wrong"),"err")};byId("pin-ok").onclick=go;byId("pin-in").onkeydown=e=>{if(e.key==="Enter")go()};}
let CHARTS={};
function chart(id,cfg){const el=byId(id);if(!el||typeof Chart==="undefined")return;const ctx=el.getContext&&el.getContext("2d");if(!ctx)return;try{if(CHARTS[id])CHARTS[id].destroy();CHARTS[id]=new Chart(ctx,cfg)}catch(e){console.warn("chart",e)}}
function emptyBox(icon,title,p,btnHtml){return`<div class="empty">${ic(icon)}<b>${esc(title)}</b><p>${esc(p||"")}</p>${btnHtml||""}</div>`;}

const PAGES=[["dash","nav_dash","home"],["inv","nav_inv","receipt"],["cust","nav_cust","users"],["col","nav_col","cash"],["prod","nav_prod","box"],["stock","nav_stock","store"],["rep","nav_rep","chart"],["ai","nav_ai","spark"],["set","nav_set","gear"],["help","nav_help","help"]];
let CUR="dash";
function navName(k,l){return (db.settings.navNames||{})[k]||t(l);}
function allNav(){
 const base=PAGES.map(([k,l,icn])=>({k,label:navName(k,l),icon:icn}));
 const customs=(db.custom||[]).map(c=>({k:"cx_"+c.id,label:c.name,icon:c.icon||"box"}));
 const i=base.findIndex(x=>x.k==="ai");
 return base.slice(0,i).concat(customs,base.slice(i));
}
function go(p){
 if(p.startsWith("cx_")&&(typeof CX!=="function"||!CX(p.slice(3))))p="dash";
 CUR=p;CHARTS={};renderShellNav();
 const el=byId("page");
 if(p.startsWith("cx_")){el.innerHTML=cxPage(p.slice(3));cxAfter(p.slice(3));}
 else{const fn=window["page_"+p];el.innerHTML=fn?fn():"";const after=window["after_"+p];if(after)after();}
 window.scrollTo({top:0});
}
function renderShellNav(){
 const items=allNav();
 byId("nav").innerHTML=items.map(it=>`<button class="nav-item ${CUR===it.k?"on":""}" onclick="go('${it.k}')">${ic(it.icon)}<span>${esc(it.label)}</span></button>`).join("")
  +`<button class="nav-item" style="color:#F2C98C" onclick="cxNew()">${ic("plus")}<span>${t("cx_add")}</span></button>`;
 const mob=["dash","inv","cust","col"];
 byId("bottomnav").innerHTML=mob.map(k=>{const it=items.find(x=>x.k===k);return`<button class="${CUR===k?"on":""}" onclick="go('${k}')">${ic(it.icon)}<span>${esc(it.label)}</span></button>`}).join("")+`<button onclick="moreMenu()" class="${mob.includes(CUR)?"":"on"}">${ic("menu")}<span>${t("more")}</span></button>`;
 const it=items.find(x=>x.k===CUR);byId("tb-title").textContent=it?it.label:"";
 byId("brand-name").textContent=db.settings.biz||t("appName");
 document.title=(db.settings.biz||t("appName"));
}
function moreMenu(){
 const items=allNav().filter(x=>!["dash","inv","cust","col"].includes(x.k));
 modal(`${mhead(t("more"),"menu")}<div class="modal-b"><div class="grid g2">${items.map(it=>`<button class="btn soft lg" style="justify-content:flex-start" onclick="closeModal();go('${it.k}')">${ic(it.icon)}${esc(it.label)}</button>`).join("")}<button class="btn amber lg" style="justify-content:flex-start" onclick="closeModal();cxNew()">${ic("plus")}${t("cx_add")}</button></div></div>`);

"use strict";
/* ---- Excel style helpers (xlsx-js-style) ---- */
const BRD=()=>{const s={style:"thin",color:{rgb:"FF9AA5A0"}};return{top:s,bottom:s,left:s,right:s}};
const XF="Cairo";
const XS={
 title:c=>({font:{name:XF,sz:14,bold:true,color:{rgb:"FFFFFFFF"}},fill:{fgColor:{rgb:c||"FF14324F"}},alignment:{horizontal:"center",vertical:"center"},border:BRD()}),
 head:c=>({font:{name:XF,sz:11,bold:true,color:{rgb:"FFFFFFFF"}},fill:{fgColor:{rgb:c||"FF0E5A3C"}},alignment:{horizontal:"center",vertical:"center",wrapText:true},border:BRD()}),
 cell:{font:{name:XF,sz:11},alignment:{horizontal:"center",vertical:"center"},border:BRD()},
 st:{font:{name:XF,sz:11,bold:true},alignment:{horizontal:"right",vertical:"center"},border:BRD()},
 money:{font:{name:XF,sz:11},alignment:{horizontal:"center",vertical:"center"},border:BRD(),numFmt:"#,##0.00"},
 pct:{font:{name:XF,sz:11},alignment:{horizontal:"center"},border:BRD(),numFmt:"0.0%"},
 tot:{font:{name:XF,sz:11,bold:true},alignment:{horizontal:"center",vertical:"center"},border:BRD(),fill:{fgColor:{rgb:"FFE7EDF4"}},numFmt:"#,##0.00"},
 totTx:{font:{name:XF,sz:11,bold:true},alignment:{horizontal:"right",vertical:"center"},border:BRD(),fill:{fgColor:{rgb:"FFE7EDF4"}}}
};
const XC=(v,s,extra)=>Object.assign({v:v,t:typeof v==="number"?"n":"s",s:s||XS.cell},extra||{});
const XFm=(f,s)=>({t:"n",f:f,s:s||XS.money});
const XSn=s=>Object.assign({},s,{numFmt:"#,##0"});
function mkWS(rows,widths,merges){const ws=XLSX.utils.aoa_to_sheet(rows);if(widths)ws["!cols"]=widths.map(w=>({wch:w}));if(merges)ws["!merges"]=merges;return ws;}
function mkWB(){const wb=XLSX.utils.book_new();wb.Workbook={Views:[{RTL:LANG==="ar"}]};return wb;}
function shName(n,used){let s=String(n||"Sheet").replace(/[\[\]:*?\/\\]/g," ").trim().slice(0,28)||"Sheet";const base=s;let i=2;while(used.has(s)){s=base.slice(0,25)+"_"+(i++)}used.add(s);return s;}
function dlWB(wb,name){try{XLSX.writeFile(wb,name,{compression:true});toast(t("export_done"))}catch(e){console.warn(e);toast(t("invalid_file"),"err")}}

/* ---- export: daily invoice ---- */
function buildInvoiceWB(inv){
 const wb=mkWB();const lines=inv.lines||[];const n=lines.length;
 const rows=[];
 rows.push([XC((db.settings.biz?db.settings.biz+" — ":"")+t("i_head")+"  "+fmtD(inv.date)+(inv.routeId?" — "+R_name(inv.routeId):""),XS.title())]);
 rows.push([t("s_product"),t("i_price"),t("i_out"),t("i_vout"),t("i_ret"),t("i_vret"),t("i_net"),t("i_income")].map(h=>XC(h,XS.head("FF14324F"))));
 lines.forEach((l,i)=>{const r=i+3;const p=P_get(l.pid);
  rows.push([XC(l.pname||(p?p.name:""),XS.st),XC(num(l.price),XS.money),XC(num(l.out),XS.cell),XFm(`B${r}*C${r}`),XC(num(l.ret),XS.cell),XFm(`B${r}*E${r}`),XFm(`C${r}-E${r}`,XSn(XS.money)),XFm(`B${r}*G${r}`)]);
 });
 const tr=n+3;
 rows.push([XC(t("i_total"),XS.totTx),XC("",XS.tot),XFm(`SUM(C3:C${tr-1})`,XSn(XS.tot)),XFm(`SUM(D3:D${tr-1})`,XS.tot),XFm(`SUM(E3:E${tr-1})`,XSn(XS.tot)),XFm(`SUM(F3:F${tr-1})`,XS.tot),XFm(`SUM(G3:G${tr-1})`,XSn(XS.tot)),XFm(`SUM(H3:H${tr-1})`,XS.tot)]);
 const ws=mkWS(rows,[26,11,11,13,11,13,13,14],[{s:{r:0,c:0},e:{r:0,c:7}}]);
 ws["!rows"]=[{hpt:26}];
 XLSX.utils.book_append_sheet(wb,ws,shName(t("i_title"),new Set()));
 return wb;
}
function exportInvoice(id){const inv=db.invoices.find(x=>x.id===id);if(!inv)return;dlWB(buildInvoiceWB(inv),`فاتورة-${inv.date}.xlsx`);}

/* ---- export: customer books, one sheet per route ---- */
function custRows(list,balMap){
 const rows=[];
 rows.push([t("c_name"),t("c_addr"),t("c_phone"),t("c_bal"),t("c_paid_today"),t("c_bal_after")].map(h=>XC(h,XS.head())));
 list.forEach((c,i)=>{const r=i+2;
  rows.push([XC(c.name,XS.st),XC(c.address||"",XS.cell),XC(fixPhone(c.phone),XS.cell,{t:"s"}),XC(num(balMap[c.id]),XS.money),XC(0,XS.money),XFm(`D${r}-E${r}`)]);
 });
 const tr=list.length+2;
 rows.push([XC(t("total"),XS.totTx),XC("",XS.tot),XC("",XS.tot),XFm(`SUM(D2:D${tr-1})`,XS.tot),XFm(`SUM(E2:E${tr-1})`,XS.tot),XFm(`SUM(F2:F${tr-1})`,XS.tot)]);
 return rows;
}
function buildCustomersWB(){
 const wb=mkWB();const used=new Set();const bal=balances();
 const groups=[...db.routes.map(r=>({name:r.name,list:db.customers.filter(c=>c.routeId===r.id)})),{name:t("c_no_route"),list:db.customers.filter(c=>!R_get(c.routeId))}].filter(g=>g.list.length);
 const sumName=shName(LANG==="ar"?"كل البيانات":"Summary",used);
 const names=groups.map(g=>({sn:shName(g.name,used),g}));
 const sumRows=[[XC(t("c_route"),XS.head("FF14324F")),XC(t("c_count"),XS.head("FF14324F")),XC(t("c_bal"),XS.head("FF14324F"))]];
 names.forEach(({sn,g},i)=>{sumRows.push([XC(g.name,XS.st),XFm(`COUNTA('${sn}'!A2:A${g.list.length+1})`,XSn(XS.cell)),XFm(`'${sn}'!D${g.list.length+2}`,XS.money)]);});
 sumRows.push([XC(t("total"),XS.totTx),XFm(`SUM(B2:B${names.length+1})`,XSn(XS.tot)),XFm(`SUM(C2:C${names.length+1})`,XS.tot)]);
 XLSX.utils.book_append_sheet(wb,mkWS(sumRows,[22,12,16]),sumName);
 names.forEach(({sn,g})=>XLSX.utils.book_append_sheet(wb,mkWS(custRows(g.list,bal),[24,26,15,13,14,15]),sn));
 return wb;
}
function exportCustomers(){if(!db.customers.length)return toast(t("c_empty"),"err");dlWB(buildCustomersWB(),`عملاء-${todayISO()}.xlsx`);}

 const tr=db.products.length+2;

 return mkWS(rows,[26,10,12,12,15,10]);

/* ---- export: product analysis report ---- */
function buildReportWB(from,to){
 const wb=mkWB();const stats=prodStats(from,to);
 const rows=[[XC((db.settings.biz?db.settings.biz+" — ":"")+t("r_byprod")+`  ${fmtD(from)} → ${fmtD(to)}`,XS.title())],

const HKEYS={
 balAfter:["الشكك بعد الدفع","الشك بعد الدفع"],
 name:["اسم العميل","العميل","customer"],
 route:["اسم البلد","البلد","الخط","route","town","city"],
 addr:["العنوان","address"],
 phone:["الهاتف","التليفون","رقم الهاتف","تليفون","موبايل","phone"],
 bal:["شكك","الشكك","المديونية","مديونية","الرصيد","debt","balance"],
 pname:["الصنف","اسم الصنف","product"],
 unit:["الوحدة","unit"],
 price:["السعر للكيس / الكرتونة","سعر البيع","السعر","price"],
 cost:["سعر الشراء","التكلفة","cost"],
 qty:["العدد","الكمية","qty","stock"],
 min:["حد التنبيه","الحد","min"]
};
const normH=h=>String(h??"").replace(/\s+/g," ").trim().toLowerCase();
function mapHeaders(row,fields){
 const cells=row.map(normH);const map={};const taken=new Set();
 fields.forEach(f=>{const keys=HKEYS[f]||[];for(let i=0;i<cells.length;i++){if(taken.has(i)||!cells[i])continue;
  if(keys.some(k=>cells[i]===k.toLowerCase()||cells[i].includes(k.toLowerCase()))){map[f]=i;taken.add(i);break;}}});
 return map;
}
function detectHeader(rows,fields,mustHave){
 for(let r=0;r<Math.min(rows.length,8);r++){const map=mapHeaders(rows[r]||[],fields);if(map[mustHave]!==undefined)return{row:r,map};}
 return null;
}
async function readWBFile(file){const buf=await file.arrayBuffer();return XLSX.read(buf,{type:"array"});}
function parseCustomerSheet(ws,sheetName,useSheetAsRoute){
 const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
 const det=detectHeader(rows,["balAfter","name","route","addr","phone","bal"],"name");
 if(!det)return{rows:[],skipped:0,bad:true};
 const out=[];let skipped=0;
 for(let r=det.row+1;r<rows.length;r++){const row=rows[r]||[];const name=String(row[det.map.name]??"").trim();
  if(!name){skipped++;continue;}
  const balA=det.map.balAfter!==undefined?row[det.map.balAfter]:"";
  const bal=(balA!==""&&balA!==null&&balA!==undefined)?balA:(det.map.bal!==undefined?row[det.map.bal]:0);
  out.push({name,route:useSheetAsRoute?String(sheetName).trim():(det.map.route!==undefined?String(row[det.map.route]??"").trim():""),address:det.map.addr!==undefined?String(row[det.map.addr]??"").trim():"",phone:det.map.phone!==undefined?fixPhone(row[det.map.phone]):"",opening:num(bal)});
 }
 return{rows:out,skipped,bad:false};
}
function parseProductsWB(wb){
 const out=[];let skipped=0;let any=false;
 wb.SheetNames.forEach(sn=>{const rows=XLSX.utils.sheet_to_json(wb.Sheets[sn],{header:1,defval:""});
  const det=detectHeader(rows,["pname","unit","price","cost","qty","min"],"pname");if(!det)return;any=true;
  for(let r=det.row+1;r<rows.length;r++){const row=rows[r]||[];const name=String(row[det.map.pname]??"").trim();if(!name){skipped++;continue;}
   out.push({name,unit:det.map.unit!==undefined?String(row[det.map.unit]??"").trim():"",price:det.map.price!==undefined?num(row[det.map.price]):0,cost:det.map.cost!==undefined?num(row[det.map.cost]):0,stock:det.map.qty!==undefined?num(row[det.map.qty]):0,min:det.map.min!==undefined?num(row[det.map.min]):10});}
 });
 return{rows:out,skipped,bad:!any};
}

function stockOp(type){
 const title=type==="in"?t("s_in"):type==="dmg"?t("s_dmg"):t("s_adj");
 modal(`${mhead(title,"store")}<div class="modal-b">
  <div class="field"><label>${t("s_product")}</label><select class="inp" id="so-pid">${db.products.filter(p=>p.active).map(p=>`<option value="${p.id}">${esc(p.name)} — ${qfmt(p.stock)}</option>`).join("")}</select></div>
  <div class="frow"><div class="field"><label>${type==="adj"?t("s_newbal"):t("s_qty")}</label><input class="inp num" id="so-qty" type="number" step="any" inputmode="decimal"></div>
  <div class="field"><label>${t("date")}</label><input class="inp" id="so-date" type="date" value="${todayISO()}"></div></div>
  <div class="field"><label>${t("s_reason")} (${t("optional")})</label><input class="inp" id="so-note"></div>
 </div><div class="modal-f"><button class="btn ${type==="dmg"?"red":""}" id="so-save">${ic("check")} ${t("save")}</button><button class="btn ghost" onclick="closeModal()">${t("cancel")}</button></div>`);
 byId("so-save").onclick=()=>{const p=P_get(byId("so-pid").value);if(!p)return;const q=num(byId("so-qty").value);const d=byId("so-date").value||todayISO();const note=byId("so-note").value.trim();
  if(type==="in"){p.stock=num(p.stock)+q;addMove(p.id,"in",q,note,d);}
  else if(type==="dmg"){p.stock=num(p.stock)-q;addMove(p.id,"dmg",q,note,d);}
  else{addMove(p.id,"adj",q-num(p.stock),note,d);p.stock=q;}
  save();closeModal();toast(t("toast_saved"));go("stock");};
}

let INV=null;
function invEdit(id){
 const src=id?db.invoices.find(x=>x.id===id):null;
 INV=src?JSON.parse(JSON.stringify(src)):{id:null,date:todayISO(),routeId:"",worker:"",lines:[],stockApplied:true,note:""};
 if(!id&&!INV.lines.length)invAddAll(true);
 invModal(id);
}
function invDup(id){const src=db.invoices.find(x=>x.id===id);if(!src)return;INV=JSON.parse(JSON.stringify(src));INV.id=null;INV.date=todayISO();invModal(null);}
function invModal(id){
 modal(`${mhead(id?t("edit")+" — "+t("i_title"):t("i_new"),"receipt")}<div class="modal-b">
  <div class="grid g3">
   <div class="field"><label>${t("date")}</label><input class="inp" type="date" value="${INV.date}" onchange="INV.date=this.value"></div>
   <div class="field"><label>${t("i_route")}</label><select class="inp" onchange="INV.routeId=this.value"><option value="">—</option>${db.routes.map(r=>`<option value="${r.id}" ${INV.routeId===r.id?"selected":""}>${esc(r.name)}</option>`).join("")}</select></div>
   <div class="field"><label>${t("i_worker")}</label><input class="inp" value="${esc(INV.worker||"")}" oninput="INV.worker=this.value"></div>
  </div>
  <div class="btn-row" style="margin-bottom:10px">
   <button class="btn soft sm" onclick="invAddAll()">${ic("plus")} ${t("i_addall")}</button>
   <select class="inp" style="max-width:210px" id="if-addsel"><option value="">${t("i_addone")}...</option>${db.products.filter(p=>p.active).map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join("")}</select>
  </div>
  <div id="if-lines"></div>
  <label class="check-row" style="margin-top:12px"><span class="switch"><input type="checkbox" ${INV.stockApplied?"checked":""} onchange="INV.stockApplied=this.checked"><i></i></span> ${t("i_apply")}</label>
 </div><div class="modal-f"><button class="btn lg" onclick="invSave()">${ic("check")} ${t("save")}</button><button class="btn ghost" onclick="closeModal()">${t("cancel")}</button></div>`,true);
 byId("if-addsel").onchange=e=>{const pid=e.target.value;if(!pid)return;invAddLine(pid);e.target.value="";};
 invRenderLines();
}
function invAddAll(silent){db.products.filter(p=>p.active).forEach(p=>{if(!INV.lines.some(l=>l.pid===p.id))INV.lines.push({pid:p.id,pname:p.name,price:num(p.price),out:0,ret:0});});if(!silent)invRenderLines();}
function invAddLine(pid){const p=P_get(pid);if(!p||INV.lines.some(l=>l.pid===pid))return invRenderLines();INV.lines.push({pid,pname:p.name,price:num(p.price),out:0,ret:0});invRenderLines();}
function invRenderLines(){
 const el=byId("if-lines");if(!el)return;
 el.innerHTML=`<div class="tbl-wrap"><table class="tbl navy" style="min-width:780px"><thead><tr><th>${t("s_product")}</th><th>${t("i_price")}</th><th>${t("i_out")}</th><th>${t("i_vout")}</th><th>${t("i_ret")}</th><th>${t("i_vret")}</th><th>${t("i_net")}</th><th>${t("i_income")}</th><th></th></tr></thead><tbody>
 ${INV.lines.map((l,i)=>`<tr>
  <td class="st">${esc(l.pname||(P_get(l.pid)||{}).name||"")}</td>
  <td><input class="inp num" type="number" step="any" inputmode="decimal" value="${num(l.price)}" oninput="invUpd(${i},'price',this.value)"></td>
  <td><input class="inp num" type="number" step="any" inputmode="decimal" value="${num(l.out)||""}" placeholder="0" oninput="invUpd(${i},'out',this.value)"></td>
  <td class="num" id="if-vout-${i}">${money(num(l.price)*num(l.out))}</td>
  <td><input class="inp num" type="number" step="any" inputmode="decimal" value="${num(l.ret)||""}" placeholder="0" oninput="invUpd(${i},'ret',this.value)"></td>
  <td class="num" id="if-vret-${i}">${money(num(l.price)*num(l.ret))}</td>
  <td class="num" id="if-net-${i}">${qfmt(num(l.out)-num(l.ret))}</td>
  <td class="num money-pos" id="if-inc-${i}">${money(num(l.price)*(num(l.out)-num(l.ret)))}</td>
  <td><button class="icon-btn" onclick="invRm(${i})" title="${t("delete")}">${ic("x")}</button></td></tr>`).join("")}
 </tbody><tfoot><tr id="if-totrow"></tr></tfoot></table></div>`;
 invTotalsRow();
}
function invRm(i){INV.lines.splice(i,1);invRenderLines();}
function invUpd(i,k,v){const l=INV.lines[i];if(!l)return;l[k]=num(v);
 byId("if-vout-"+i).textContent=money(num(l.price)*num(l.out));
 byId("if-vret-"+i).textContent=money(num(l.price)*num(l.ret));
 byId("if-net-"+i).textContent=qfmt(num(l.out)-num(l.ret));
 byId("if-inc-"+i).textContent=money(num(l.price)*(num(l.out)-num(l.ret)));
 invTotalsRow();
}
function invTotalsRow(){const s=invTotals(INV);const tr=byId("if-totrow");if(!tr)return;
 tr.innerHTML=`<td class="st">${t("i_total")}</td><td></td><td class="num">${qfmt(s.qout)}</td><td class="num">${money(s.vout)}</td><td class="num">${qfmt(s.qret)}</td><td class="num">${money(s.vret)}</td><td class="num">${qfmt(s.net)}</td><td class="num">${money(s.inc)}</td><td></td>`;
}
function invSave(){
 INV.lines=INV.lines.filter(l=>num(l.out)||num(l.ret));
 if(!INV.lines.length)return toast(t("i_lines_req"),"err");
 if(INV.id){const old=db.invoices.find(x=>x.id===INV.id);if(old){applyInvStock(old,-1);Object.assign(old,JSON.parse(JSON.stringify(INV)));applyInvStock(old,1);}}
 else{INV.id=uid();db.invoices.push(INV);applyInvStock(INV,1);}
 save();closeModal();toast(t("i_saved"));go("inv");
}
function invDel(id){askPin(()=>confirmBox(t("delete"),t("i_del_q"),()=>{const v=db.invoices.find(x=>x.id===id);if(v)applyInvStock(v,-1);db.invoices=db.invoices.filter(x=>x.id!==id);save();toast(t("del_done"));go("inv");},true));}

function repBody(){

 const invs=db.invoices.filter(v=>v.date>=F&&v.date<=TO);
 const sales=invs.reduce((s,v)=>s+invTotals(v).inc,0);
 const rets=invs.reduce((s,v)=>s+invTotals(v).vret,0);
 const cols=db.transactions.filter(x=>x.type==="pay"&&x.date>=F&&x.date<=TO).reduce((s,x)=>s+num(x.amount),0);
 const debts=db.transactions.filter(x=>x.type==="debt"&&x.date>=F&&x.date<=TO).reduce((s,x)=>s+num(x.amount),0);
 const stats=prodStats(F,TO);
 if(!invs.length&&!cols&&!debts)return`<div class="card">${emptyBox("chart",t("r_nodata"),"")}</div>`;
 const bal=balances();
 const topDebt=db.customers.map(c=>({c,b:num(bal[c.id])})).filter(x=>x.b>0).sort((a,b)=>b.b-a.b).slice(0,10);
 return`
 <div class="grid g4" style="margin-bottom:16px">
  <div class="kpi" style="--kc:var(--green)"><div class="lbl">${ic("receipt")} ${t("r_sales")}</div><div class="val">${money(sales)}</div><div class="sub">${invs.length} ${t("nav_inv")}</div></div>
  <div class="kpi" style="--kc:var(--red)"><div class="lbl">${ic("alert")} ${t("r_returns")}</div><div class="val">${money(rets)}</div><div class="sub">${cur()}</div></div>
  <div class="kpi" style="--kc:var(--amber)"><div class="lbl">${ic("cash")} ${t("r_colsum")}</div><div class="val">${money(cols)}</div><div class="sub">${cur()}</div></div>
  <div class="kpi" style="--kc:var(--navy)"><div class="lbl">${ic("wallet")} ${t("r_newdebt")}</div><div class="val">${money(debts)}</div><div class="sub">${cur()}</div></div>
 </div>
 <div class="grid g2">
  <div class="card tabbed"><h3>${ic("chart")} ${t("r_trend")}</h3><div class="chart-box"><canvas id="ch-trend"></canvas></div></div>
  <div class="card tabbed" style="--tab:var(--amber)"><h3>${ic("box")} ${t("r_top")}</h3><div class="chart-box"><canvas id="ch-top"></canvas></div></div>

  <div class="card tabbed" style="--tab:var(--navy)"><h3>${ic("wallet")} ${t("r_topdebt")}</h3>
   ${topDebt.length?topDebt.map(x=>`<div class="kv"><span>${esc(x.c.name)} <span class="hint">(${esc(R_name(x.c.routeId))})</span></span><b class="money-neg">${money(x.b)}</b></div>`).join(""):`<p class="muted">${t("r_nodata")}</p>`}
  </div>
 </div>
 <div class="card tabbed"><h3>${ic("box")} ${t("r_byprod")}</h3>
 <div class="tbl-wrap"><table class="tbl navy"><thead><tr><th>${t("s_product")}</th><th>${t("i_out")}</th><th>${t("i_ret")}</th><th>${t("i_net")}</th><th>${t("i_income")}</th><th>${t("r_retrate")}</th></tr></thead><tbody>
 ${stats.map(s=>{const rr=s.qout?s.qret/s.qout:0;return`<tr><td class="st">${esc(s.name)}</td><td class="num">${qfmt(s.qout)}</td><td class="num">${qfmt(s.qret)}</td><td class="num">${qfmt(s.qout-s.qret)}</td><td class="num money-pos">${money(s.inc)}</td><td class="num">${rr>0.15?`<span class="badge r">${(rr*100).toFixed(1)}%</span>`:(rr*100).toFixed(1)+"%"}</td></tr>`}).join("")}
 </tbody></table></div></div>`;
}
function after_rep(){
 const F=REP.from,TO=REP.to;
 const days=[];for(let d=F;d<=TO&&days.length<92;){days.push(d);const x=new Date(d);x.setDate(x.getDate()+1);d=x.getFullYear()+"-"+String(x.getMonth()+1).padStart(2,"0")+"-"+String(x.getDate()).padStart(2,"0");}
 const series=days.map(d=>db.invoices.filter(v=>v.date===d).reduce((s,v)=>s+invTotals(v).inc,0));
 chart("ch-trend",{type:"line",data:{labels:days.map(d=>d.slice(5).split("-").reverse().join("/")),datasets:[{data:series,borderColor:"#0E5A3C",backgroundColor:"rgba(14,90,60,.12)",fill:true,tension:.3,pointRadius:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});
 const stats=prodStats(F,TO).slice(0,8);
 chart("ch-top",{type:"bar",data:{labels:stats.map(s=>s.name),datasets:[{data:stats.map(s=>s.inc),backgroundColor:"#C9822E",borderRadius:6}]},options:{indexAxis:"y",responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}});
 const bal=balances();const byRoute={};
 db.customers.forEach(c=>{const rn=R_name(c.routeId);byRoute[rn]=(byRoute[rn]||0)+Math.max(0,num(bal[c.id]))});
 const entries=Object.entries(byRoute).filter(x=>x[1]>0).sort((a,b)=>b[1]-a[1]).slice(0,9);
 chart("ch-route",{type:"doughnut",data:{labels:entries.map(x=>x[0]),datasets:[{data:entries.map(x=>x[1]),backgroundColor:["#0E5A3C","#C9822E","#14324F","#B4372F","#12744E","#8a5a1d","#3f6212","#155e75","#6d28d9"]}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:LANG==="ar"?"right":"left",labels:{boxWidth:14}}}}});
}

function genInsights(){
 const out=[];const bal=balances();const c=cur();
 const low=db.products.filter(p=>p.active&&num(p.stock)<=num(p.min));
 if(low.length)out.push({kind:"warn",icon:"box",title:LANG==="ar"?`${low.length} صنف قارب على النفاد`:`${low.length} products running low`,body:low.slice(0,5).map(p=>`${p.name} (${qfmt(p.stock)})`).join("، ")});
 const debtors=db.customers.map(x=>({x,b:num(bal[x.id])})).filter(y=>y.b>0).sort((a,b)=>b.b-a.b);
 if(debtors.length){const tot=debtors.reduce((s,y)=>s+y.b,0);const top5=debtors.slice(0,5).reduce((s,y)=>s+y.b,0);
  out.push({kind:"info",icon:"wallet",title:LANG==="ar"?`إجمالي الشكوك ${money(tot)} ${c}`:`Total debts ${money(tot)} ${c}`,body:LANG==="ar"?`أعلى 5 عملاء عليهم ${money(top5)} (${Math.round(top5/tot*100)}% من الإجمالي) — ابدأ بيهم في التحصيل.`:`Top 5 debtors hold ${money(top5)} (${Math.round(top5/tot*100)}% of total) — start collections with them.`});}
 const s7=db.invoices.filter(v=>v.date>=daysAgo(6)).reduce((s,v)=>s+invTotals(v).inc,0);
 const sPrev=db.invoices.filter(v=>v.date>=daysAgo(13)&&v.date<daysAgo(6)).reduce((s,v)=>s+invTotals(v).inc,0);
 if(s7||sPrev){const diff=sPrev?Math.round((s7-sPrev)/sPrev*100):100;
  out.push({kind:diff>=0?"good":"warn",icon:"chart",title:LANG==="ar"?`مبيعات الأسبوع ${money(s7)} ${c}`:`This week's sales ${money(s7)} ${c}`,body:LANG==="ar"?(diff>=0?`زيادة ${diff}% عن الأسبوع السابق (${money(sPrev)}).`:`انخفاض ${Math.abs(diff)}% عن الأسبوع السابق (${money(sPrev)}).`):(diff>=0?`Up ${diff}% vs prior week (${money(sPrev)}).`:`Down ${Math.abs(diff)}% vs prior week (${money(sPrev)}).`)});}
 prodStats(daysAgo(29),todayISO()).forEach(s=>{if(s.qout>=20&&s.qret/s.qout>0.15)out.push({kind:"warn",icon:"alert",title:LANG==="ar"?`مرتجع مرتفع: ${s.name}`:`High returns: ${s.name}`,body:LANG==="ar"?`نسبة المرتجع ${(s.qret/s.qout*100).toFixed(0)}% آخر 30 يوم — فكّر تقلل الكمية المحمّلة.`:`Return rate ${(s.qret/s.qout*100).toFixed(0)}% in 30 days — consider loading less.`});});
 const best=prodStats(daysAgo(29),todayISO())[0];
 if(best&&best.inc>0)out.push({kind:"good",icon:"spark",title:LANG==="ar"?`الأكثر دخلًا: ${best.name}`:`Top earner: ${best.name}`,body:LANG==="ar"?`حقق ${money(best.inc)} ${c} آخر 30 يوم — اتأكد إن مخزونه دايمًا متوفر.`:`Made ${money(best.inc)} ${c} in 30 days — keep it stocked.`});
 return out;
}

function aiPush(role,content){AI_HIST.push({role,content});if(AI_HIST.length>24)AI_HIST=AI_HIST.slice(-24);const log=byId("ai-log");if(log){log.innerHTML=AI_HIST.map(m=>`<div class="msg ${m.role==="user"?"u":"b"}">${esc(m.content)}</div>`).join("");log.scrollTop=log.scrollHeight;}}
function aiLocalAnswer(q){
 const bal=balances();const c=cur();
 const has=(...ws)=>ws.some(w=>q.includes(w));
 if(has("شكوك","شكك","مديون","يدين","فلوس","debt","owe")){
  if(has("خط","بلد","route")){const byRoute={};db.customers.forEach(x=>{const rn=R_name(x.routeId);byRoute[rn]=(byRoute[rn]||0)+Math.max(0,num(bal[x.id]))});
   const top=Object.entries(byRoute).sort((a,b)=>b[1]-a[1]).slice(0,5);
   return (LANG==="ar"?"أعلى الخطوط شكوكًا:\n":"Routes with most debt:\n")+top.map((x,i)=>`${i+1}. ${x[0]}: ${money(x[1])} ${c}`).join("\n");}
  const top=db.customers.map(x=>({x,b:num(bal[x.id])})).filter(y=>y.b>0).sort((a,b)=>b.b-a.b).slice(0,7);
  if(!top.length)return LANG==="ar"?"مفيش شكوك حاليًا 👌":"No outstanding debts 👌";
  return (LANG==="ar"?"أعلى العملاء مديونية:\n":"Top debtors:\n")+top.map((y,i)=>`${i+1}. ${y.x.name} (${R_name(y.x.routeId)}): ${money(y.b)} ${c}`).join("\n");}
 if(has("مبيع","بيع","أداء","sales","week","أسبوع","شهر")){
  const s7=db.invoices.filter(v=>v.date>=daysAgo(6)).reduce((s,v)=>s+invTotals(v).inc,0);
  const s30=db.invoices.filter(v=>v.date>=daysAgo(29)).reduce((s,v)=>s+invTotals(v).inc,0);
  const best=prodStats(daysAgo(29),todayISO()).slice(0,5);
  return (LANG==="ar"?`مبيعات آخر 7 أيام: ${money(s7)} ${c}\nمبيعات آخر 30 يوم: ${money(s30)} ${c}\n\nالأكثر مبيعًا (30 يوم):\n`:`Sales last 7 days: ${money(s7)} ${c}\nLast 30 days: ${money(s30)} ${c}\n\nTop sellers (30d):\n`)+best.map((s,i)=>`${i+1}. ${s.name}: ${money(s.inc)} ${c}`).join("\n");}
 if(has("صنف","أصناف","مخزون","خلص","نفاد","stock","low","product")){
  const low=db.products.filter(p=>p.active&&num(p.stock)<=num(p.min));
  const best=prodStats(daysAgo(29),todayISO()).slice(0,5);
  let ans="";
  if(has("خلص","نفاد","low"))ans=(low.length?(LANG==="ar"?"أصناف قاربت على النفاد:\n":"Low stock:\n")+low.map(p=>`• ${p.name}: ${qfmt(p.stock)} ${unitName(p.unit)}`).join("\n"):(LANG==="ar"?"كل الأصناف فوق حد التنبيه 👌":"All products above alert level 👌"));
  else ans=(LANG==="ar"?"الأكثر مبيعًا آخر 30 يوم:\n":"Top sellers (30d):\n")+best.map((s,i)=>`${i+1}. ${s.name}: ${money(s.inc)} ${c}`).join("\n");
  return ans;}
 if(has("تحصيل","محصل","collect")){
  const today=db.transactions.filter(x=>x.type==="pay"&&x.date===todayISO()).reduce((s,x)=>s+num(x.amount),0);
  const m=db.transactions.filter(x=>x.type==="pay"&&x.date>=todayISO().slice(0,8)+"01").reduce((s,x)=>s+num(x.amount),0);
  return LANG==="ar"?`تحصيل اليوم: ${money(today)} ${c}\nتحصيل الشهر: ${money(m)} ${c}`:`Collected today: ${money(today)} ${c}\nThis month: ${money(m)} ${c}`;}
 return null;
}
async function aiAsk(q,isChip){
 q=String(q||"").trim();if(!q)return;
 const inp=byId("ai-q");if(inp)inp.value="";
 aiPush("user",q);
 const local=aiLocalAnswer(q);
 if(local&&(isChip||!db.settings.aiKey)){aiPush("assistant",local);return;}
 if(!db.settings.aiKey||!navigator.onLine){aiPush("assistant",local||t("a_need_net"));return;}
 aiPush("assistant",t("a_thinking"));
 try{const ans=await askClaude(q,AI_HIST.slice(0,-1));AI_HIST.pop();aiPush("assistant",ans||t("a_err"));}
 catch(e){AI_HIST.pop();aiPush("assistant",local||t("a_err"));}
}

function page_help(){
 if(LANG==="en")return`<div class="card help-sec">
 <h3>${ic("help")} ${t("nav_help")}</h3>
 <h4>What is this?</h4><p>A complete offline-first system for your distribution business: daily invoices with automatic math, customers organized by route with debt tracking, collections, inventory (received/damaged), reports, and Excel import/export with built-in formulas. All data is stored inside the browser on this device.</p>
 <h4>Use it on PC like a desktop app</h4><ol><li>Keep the HTML file in a fixed folder (e.g. Documents).</li><li>Open it with Chrome or Edge. In Chrome: menu → Cast, save and share → Create shortcut → tick "Open as window".</li><li>Pin the shortcut to the taskbar — it now opens like a normal program, no internet needed.</li></ol>
 <h4>Put it online as a permanent web portal</h4><ol><li>On github.com (same account as sync): <b>+</b> → <b>New repository</b> → name it e.g. <span class="kbd">work-gate</span> → Public → Create.</li><li>Click <b>uploading an existing file</b> → upload the system file renamed to <span class="kbd">index.html</span> → Commit.</li><li>Settings → <b>Pages</b> → Branch <b>main</b>, folder <b>/ (root)</b> → Save. In a minute you get a permanent link: <span class="kbd">https://your-username.github.io/work-gate/</span>.</li><li>Open it on any device, sign in (a brand-new device shows the defaults MASTER / Master@123 until you pull), then Settings → paste token + ID → Pull — all your work and your changed login arrive.</li><li>On phones use "Add to Home Screen". To update the app later, upload a new index.html over the old one.</li></ol><p>The file itself contains no business data — data only arrives after login + pull with your token, so a public repo is fine. (Quicker no-GitHub alternative: drag the file into <span class="kbd">app.netlify.com/drop</span>.)</p>
 <h4>Import your current Google Sheets</h4><ol><li>In Google Sheets: File → Download → Microsoft Excel (.xlsx).</li><li>Here: Customers → Import Excel. Keep "each sheet = route" on — your town tabs become routes automatically, and "الشكك بعد الدفع" is used as the opening debt. Phone numbers that lost the leading 0 are fixed automatically.</li></ol>

 <h4>تشغيله على الكمبيوتر كبرنامج</h4>
 <ol><li>حط ملف الـ HTML في مكان ثابت (مثلًا فولدر Documents) وافتحه بـ Chrome أو Edge.</li>
 <li>في Chrome: القائمة ⋮ → Cast, save and share → Create shortcut → علّم على "Open as window".</li>
 <li>ثبّت الاختصار في شريط المهام — هيفتح كبرنامج عادي من غير نت.</li></ol>
 <h4>رفعه أونلاين كبوابة على الإنترنت (لينك دائم)</h4>
 <ol><li>افتح github.com (نفس حساب المزامنة) → اضغط <b>+</b> فوق → <b>New repository</b> → سمّيه مثلًا <span class="kbd">work-gate</span> → Public → Create.</li>
 <li>في صفحة الريبو اضغط <b>uploading an existing file</b> → ارفع ملف النظام بعد ما تغيّر اسمه إلى <span class="kbd">index.html</span> → Commit.</li>
 <li>Settings → <b>Pages</b> → Branch: <b>main</b> و <b>/ (root)</b> → Save. بعد دقيقة أو اثنتين هيظهر لينك دائم بالشكل: <span class="kbd">https://اسم-حسابك.github.io/work-gate/</span>.</li>
 <li>افتح اللينك من أي جهاز: سجّل دخول (أول مرة على أي جهاز جديد بالبيانات الافتراضية MASTER / Master@123 لو لسه ما سحبتش نسختك)، ثم الإعدادات → الصق الـ Token والمعرّف → «سحب» — وكل شغلك وبيانات دخولك هتوصل.</li>
 <li>على الموبايل: من المتصفح "Add to Home Screen" فيبقى أيقونة زي التطبيق. ولما تحدّث النظام بنسخة جديدة، ارفع index.html جديد مكان القديم في نفس الريبو.</li></ol>
 <p>ملاحظة: الملف نفسه مفيهوش أي بيانات شغل — البيانات بتيجي فقط بعد تسجيل الدخول والسحب بالـ Token بتاعك، فمفيش مشكلة إن الريبو Public. (بديل أسرع بدون GitHub: اسحب الملف في <span class="kbd">app.netlify.com/drop</span>.)</p>
 <h4>استيراد شيتاتك الحالية من Google Sheets</h4>
 <ol><li>من Google Sheets: File → Download → Microsoft Excel (.xlsx).</li>
 <li>هنا: العملاء → استيراد Excel. سيب خيار "كل ورقة = بلد/خط" شغال — كل تبويب (بهنباي، كرايس...) هيتحول لخط تلقائيًا، وعمود "الشكك بعد الدفع" هيتاخد كرصيد الشكك. وأرقام التليفون اللي ضاع منها الصفر الأول بتتصلح لوحدها.</li>
 <li>الأصناف بنفس الطريقة من الإعدادات → مركز الاستيراد.</li></ol>
 <h4>الروتين اليومي المقترح</h4>
 <ol><li>الصبح: فاتورة جديدة → "إضافة كل الأصناف" → اكتب الكميات الخارجة.</li>
 <li>أثناء اليوم: التحصيل → اختار الخط → اكتب المدفوع أمام كل عميل (أو اطبع كشف ورق للمندوب).</li>
 <li>بالليل: سجّل المرتجع في نفس الفاتورة؛ المخزن بيتظبط لوحده.</li>
 <li>أسبوعيًا: نزّل نسخة احتياطية.</li></ol>
 <h4>ملفات Excel</h4>
 <p>كل تصدير بيطلع بمعادلات حية (القيمة = السعر × العدد، الباقي = الشكك − المدفوع، وصفوف SUM) وتنسيق عربي من اليمين للشمال — فالملف يفضل شغال في Excel أو Google Sheets وتعدّل فيه براحتك.</p>
 <h4>المساعد الذكي</h4>
 <p>الرؤى والأسئلة الجاهزة شغالة من غير نت. لو عايز أسئلة حرة بإجابات أذكى، حط مفتاح Claude API في صفحة المساعد (بيتحفظ على جهازك بس، وبيتبعت ملخص أرقام عام من غير أسماء عملاء).</p>
 <h4>الأقسام المخصصة — اعمل صفحاتك بنفسك</h4>
 <ol><li>من القائمة الجانبية اضغط <b>«إضافة قسم»</b> — اختار الاسم والأيقونة، وابدأ فاضي أو من قالب جاهز (سجل مصاريف، كشف حسابات بمعادلة الباقي، مهام...).</li>
 <li>جوه القسم أضف أي عناصر: <b>جدول</b> بأعمدة من اختيارك (نص، رقم، مبلغ، تاريخ، هاتف، قائمة اختيار، صح/غلط، أو <b>معادلة</b> زي C-D تتحسب لوحدها ومعاها صف إجمالي) — <b>بطاقة رقم KPI</b> مربوطة بمجموع/عدد/متوسط عمود — <b>رسم بياني</b> من أي جدول — <b>ملاحظات</b> — <b>قائمة مهام</b>.</li>
 <li>كل حاجة قابلة لإعادة التسمية والترتيب والحذف، وكل قسم له زر <b>طباعة</b> وزر <b>تصدير Excel</b> (بالمعادلات) وزر <b>استيراد صفوف</b> من ملف. ومن الإعدادات تقدر تعيد تسمية الصفحات الأساسية نفسها.</li></ol>
 <h4>المزامنة بين الأجهزة</h4>
 <p><b>الطريقة 1 — ملف مزامنة (كمبيوتر):</b> من الإعدادات اربط ملف nizam-sync.json. كل تعديل يتسجل فيه تلقائيًا. افتح نفس الملف من متصفح تاني على نفس الجهاز، أو حطه في فولدر Google Drive/OneDrive المتزامن ليوصل لأجهزتك الأخرى.</p>
 <p><b>الطريقة 2 — سحابية أونلاين (أي جهاز حتى الموبايل):</b> من الإعدادات حط GitHub Token من نوع classic (صلاحية gist فقط) واضغط «إنشاء مخزن». على أي جهاز تاني: نفس الـ Token + نفس المعرّف ثم «سحب» — هتكمل من آخر نقطة. الرفع تلقائي مع كل تعديل والسحب تلقائي عند الفتح.</p>
 <p><b>الطريقة 3 — يدوية (تشتغل في كل مكان):</b> نسخة احتياطية واحدة من الإعدادات فيها <b>كل شيء</b> (البيانات + الإعدادات + الأقسام المخصصة بتخطيطاتها) — انقلها واستَرجعها على أي جهاز.</p>
 <h4>تشغيله كبرنامج على الويندوز</h4>
 <p>حط ملف <span class="kbd">تشغيل-المنظومة.bat</span> جنب ملف النظام ودوس عليه مرتين — هيفتح في نافذة مستقلة زي أي برنامج (بدون شريط متصفح). أو من Chrome: ⋮ → Cast, save and share → Create shortcut → «Open as window».</p>

function pickOne(el){Array.from(el.parentElement.children).forEach(x=>x.classList.remove("on"));el.classList.add("on");}
function cxEval(expr,vals){
 expr=String(expr||"").trim();if(!expr||!/^[A-Z0-9+\-*/(). ]+$/.test(expr))return 0;
 const e=expr.replace(/[A-Z]/g,L=>"("+(vals[L.charCodeAt(0)-65]||0)+")");
 try{const v=Function('"use strict";return('+e+')')();return isFinite(v)?v:0}catch(_){return 0}
}
function cxRowVals(b,row){const vals=[];b.cols.forEach(c=>{vals.push(c.type==="formula"?cxEval(c.formula,vals):num(row[c.id]))});return vals;}
function cxColTotal(b,i,c){
 if(c.type==="number")return qfmt(b.rows.reduce((s,r)=>s+num(r[c.id]),0));
 if(c.type==="money"||c.type==="formula")return money(b.rows.reduce((s,r)=>s+cxRowVals(b,r)[i],0));
 return "";
}
function cxKpiVal(pid,b){const s=b.src||{};if(s.mode==="manual")return num(s.value);
 const page=CX(pid);const tb=page&&page.blocks.find(x=>x.id===s.blockId&&x.type==="table");if(!tb)return 0;
 const ci=tb.cols.findIndex(c=>c.id===s.colId);if(ci<0)return s.agg==="count"?tb.rows.length:0;
 if(s.agg==="count")return tb.rows.length;
 const vals=tb.rows.map(r=>cxRowVals(tb,r)[ci]);const sum=vals.reduce((a,x)=>a+x,0);
 return s.agg==="avg"?(vals.length?sum/vals.length:0):sum;
}

function cxAfter(id){
 const c=CX(id);if(!c)return;
 c.blocks.forEach(b=>{if(b.type!=="chart")return;

  ${i<n-1?`<button class="icon-btn" title="${t("cx_down")}" onclick="cxBlockMove('${pid}','${b.id}',1)">↓</button>`:""}

 </span></h3>`;

function cxBlockHTML(pid,b,i,n){
 if(b.type==="kpi"){const col={green:"--green",amber:"--amber",red:"--red",navy:"--navy"}[b.color||"green"];
  return`<div class="card tabbed" style="--tab:var(${col})">${cxHead(pid,b,i,n)}
  <div class="kpi" style="--kc:var(${col});max-width:340px;border:0;box-shadow:none;padding:4px 0 0"><div class="val">${money(cxKpiVal(pid,b))}</div><div class="sub">${cur()}</div></div></div>`;}
 if(b.type==="chart")return`<div class="card tabbed" style="--tab:var(--navy)">${cxHead(pid,b,i,n)}${(b.src&&b.src.blockId)?`<div class="chart-box"><canvas id="cx-ch-${b.id}"></canvas></div>`:`<p class="muted">${t("cx_no_tables")} — ${t("cx_cfg")} ⚙</p>`}</div>`;
 if(b.type==="note")return`<div class="card tabbed" style="--tab:var(--amber)">${cxHead(pid,b,i,n)}<textarea class="inp" style="min-height:110px" onchange="cxNoteSet('${pid}','${b.id}',this.value)">${esc(b.text||"")}</textarea></div>`;
 if(b.type==="check")return`<div class="card tabbed">${cxHead(pid,b,i,n)}
  ${(b.items||[]).map(it=>`<label class="check-row"><span class="switch"><input type="checkbox" ${it.done?"checked":""} onchange="cxCheckToggle('${pid}','${b.id}','${it.id}',this.checked)"><i></i></span><span style="flex:1;${it.done?"text-decoration:line-through;color:var(--ink-3)":""}">${esc(it.text)}</span><button class="icon-btn" onclick="cxCheckDel('${pid}','${b.id}','${it.id}')">${ic("x")}</button></label>`).join("")}
  <div class="btn-row"><input class="inp" id="cxk-${b.id}" placeholder="..." style="max-width:280px" onkeydown="if(event.key==='Enter')cxCheckAdd('${pid}','${b.id}')"><button class="btn sm" onclick="cxCheckAdd('${pid}','${b.id}')">${ic("plus")} ${t("add")}</button></div></div>`;
 /* table */
 return`<div class="card tabbed">${cxHead(pid,b,i,n)}
 ${b.cols.length?`<div class="tbl-wrap"><table class="tbl"><thead><tr>${b.cols.map((c,ci)=>`<th>${esc(c.name)} <span style="opacity:.6;font-weight:600">(${CX_LET(ci)})</span></th>`).join("")}<th></th></tr></thead><tbody>
 ${b.rows.map((r,ri)=>{const vals=cxRowVals(b,r);return`<tr>${b.cols.map((c,ci)=>`<td>${cxCellHTML(pid,b,c,ci,r,ri,vals)}</td>`).join("")}<td><button class="icon-btn" onclick="cxRowDel('${pid}','${b.id}',${ri})" title="${t("delete")}">${ic("x")}</button></td></tr>`}).join("")}
 </tbody>${b.showTotals?`<tfoot><tr>${b.cols.map((c,ci)=>`<td class="num" id="cxt-${b.id}-${c.id}">${ci===0&&c.type==="text"?t("total"):cxColTotal(b,ci,c)}</td>`).join("")}<td></td></tr></tfoot>`:""}</table></div>
 <div class="btn-row" style="margin-top:10px"><button class="btn soft sm" onclick="cxRowAdd('${pid}','${b.id}')">${ic("plus")} ${t("cx_row_add")}</button></div>`
 :`<p class="muted">${t("cx_cols")} ⚙</p><button class="btn soft sm" onclick="cxCols('${pid}','${b.id}')">${ic("gear")} ${t("cx_cols")}</button>`}
 </div>`;
}
function cxCellHTML(pid,b,c,ci,r,ri,vals){
 const v=r[c.id];const h=`'${pid}','${b.id}',${ri},'${c.id}'`;
 if(c.type==="formula")return`<span class="num" id="cxf-${b.id}-${ri}-${c.id}" style="font-weight:700">${money(vals[ci])}</span>`;
 if(c.type==="check")return`<input type="checkbox" ${v?"checked":""} onchange="cxCell(${h},this.checked)" style="width:19px;height:19px">`;
 if(c.type==="select")return`<select class="inp" onchange="cxCell(${h},this.value)"><option value=""></option>${(c.options||[]).map(o=>`<option ${v===o?"selected":""}>${esc(o)}</option>`).join("")}</select>`;
 if(c.type==="date")return`<input class="inp" type="date" value="${esc(v||"")}" onchange="cxCell(${h},this.value)">`;
 if(c.type==="number"||c.type==="money")return`<input class="inp num" type="number" step="any" inputmode="decimal" value="${v??""}" oninput="cxCell(${h},this.value)">`;
 if(c.type==="phone")return`<input class="inp num" inputmode="tel" value="${esc(v||"")}" onchange="cxCell(${h},this.value)">`;
 return`<input class="inp" value="${esc(v??"")}" onchange="cxCell(${h},this.value)">`;
}

/* custom export / import / print */
function cxExport(pid){
 const c=CX(pid);if(!c)return;
 const wb=mkWB();const used=new Set();
 const kpis=c.blocks.filter(b=>b.type==="kpi");
 if(kpis.length){const rows=[[XC(t("nav_rep"),XS.head("FF14324F")),XC("",XS.head("FF14324F"))]];
  kpis.forEach(k=>rows.push([XC(k.name,XS.st),XC(cxKpiVal(pid,k),XS.money)]));
  XLSX.utils.book_append_sheet(wb,mkWS(rows,[26,18]),shName(LANG==="ar"?"ملخص":"Summary",used));}
 let any=kpis.length>0;
 c.blocks.filter(b=>b.type==="table"&&b.cols.length).forEach(b=>{any=true;
  const rows=[b.cols.map(cc=>XC(cc.name,XS.head())).concat([])];
  b.rows.forEach((r,ri)=>{const xr=ri+2;
   rows.push(b.cols.map((cc,ci)=>{
    if(cc.type==="formula"){const f=String(cc.formula||"0").replace(/[A-Z]/g,L=>L+xr);return XFm(f);}
    if(cc.type==="money")return XC(num(r[cc.id]),XS.money);
    if(cc.type==="number")return XC(num(r[cc.id]),XSn(XS.cell));
    if(cc.type==="check")return XC(r[cc.id]?"✓":"",XS.cell);
    if(cc.type==="phone")return XC(fixPhone(r[cc.id]),XS.cell,{t:"s"});
    return XC(String(r[cc.id]??""),ci===0?XS.st:XS.cell);
   }));});
  if(b.showTotals){const tr=b.rows.length+2;
   rows.push(b.cols.map((cc,ci)=>{
    if(ci===0&&!["number","money","formula"].includes(cc.type))return XC(t("total"),XS.totTx);
    if(cc.type==="number")return XFm(`SUM(${CX_LET(ci)}2:${CX_LET(ci)}${tr-1})`,XSn(XS.tot));
    if(cc.type==="money"||cc.type==="formula")return XFm(`SUM(${CX_LET(ci)}2:${CX_LET(ci)}${tr-1})`,XS.tot);
    return XC("",XS.tot);
   }));}
  XLSX.utils.book_append_sheet(wb,mkWS(rows,b.cols.map(()=>16)),shName(b.name,used));
 });
 if(!any)return toast(t("cx_no_tables"),"err");
 dlWB(wb,`${c.name}-${todayISO()}.xlsx`);
}
function cxImport(pid,bid){
 const b=cxBlk(pid,bid);if(!b||!b.cols.length)return toast(t("cx_cols"),"err");
 modal(`${mhead(t("cx_imp"),"up")}<div class="modal-b"><p class="tag-note">${t("cx_imp_hint")}</p>
 <input class="inp" type="file" id="cxi-file" accept=".xlsx,.xls,.csv"></div>

 const d=JSON.parse(JSON.stringify(db));d.settings.gistToken="";d.settings.aiKey="";d.settings.syncPass="";
 const txt=JSON.stringify(d);
 if(db.settings.syncPass){if(!subtleC())throw new Error("noenc");return await encStr(db.settings.syncPass,txt);}
 return txt;
}
function cloudQueue(){if(!cloudOn()||!navigator.onLine)return;clearTimeout(CLOUD_T);CLOUD_T=setTimeout(()=>cloudPush(false),2500);}

 toast(t("cl_test_ok"));

async function cloudCreate(){
 if(!db.settings.gistToken)return toast(t("cl_need_tok"),"err");
 if(!navigator.onLine)return toast(t("cl_err_net"),"err");
 let pl;try{pl=await cloudPayload()}catch(e){return toast(t("cl_enc_unsupported"),"err")}
 const r=await cloudReq("https://api.github.com/gists",{method:"POST",headers:cloudHdr(),body:JSON.stringify({description:"nizam-business-sync",public:false,files:{"nizam-sync.json":{content:pl}}})});
 if(!r.ok||!r.data||!r.data.id)return toast(cloudMsg(r),"err");
 db.settings.gistId=r.data.id;save();toast(t("cl_linked"));go("set");

async function cloudPush(manual){
 if(!db.settings.gistToken)return manual&&toast(t("cl_need_tok"),"err");
 if(!db.settings.gistId)return manual&&toast(t("cl_need_id"),"err");
 if(!navigator.onLine)return manual&&toast(t("cl_err_net"),"err");
 let pl;try{pl=await cloudPayload()}catch(e){return manual&&toast(t("cl_enc_unsupported"),"err")}
 const r=await cloudReq("https://api.github.com/gists/"+encodeURIComponent(db.settings.gistId),{method:"PATCH",headers:cloudHdr(),body:JSON.stringify({files:{"nizam-sync.json":{content:pl}}})});
 if(!r.ok)return manual&&toast(cloudMsg(r),"err");
 if(manual)toast(t("cl_pushed"));
}
async function cloudPull(silent){
 if(!db.settings.gistToken)return !silent&&toast(t("cl_need_tok"),"err");
 if(!db.settings.gistId)return !silent&&toast(t("cl_need_id"),"err");
 if(!navigator.onLine)return !silent&&toast(t("cl_err_net"),"err");
 const r=await cloudReq("https://api.github.com/gists/"+encodeURIComponent(db.settings.gistId),{headers:cloudHdr()});
 if(!r.ok)return !silent&&toast(cloudMsg(r),"err");
 try{
  const f=r.data&&r.data.files&&r.data.files["nizam-sync.json"];if(!f)return !silent&&toast(t("cl_err_404"),"err");
  let txt=f.content;if(f.truncated&&f.raw_url)txt=await(await fetch(f.raw_url)).text();
  if(String(txt).startsWith("ENC1:")){
   if(!db.settings.syncPass)return toast(t("cl_need_pass"),"err");
   if(!subtleC())return toast(t("cl_enc_unsupported"),"err");
   try{txt=await decStr(db.settings.syncPass,txt)}catch(e){return toast(t("cl_bad_pass"),"err")}
  }
  const d=JSON.parse(txt);
  if(d&&d.meta&&Array.isArray(d.products)&&num(d.meta.savedAt)>num(db.meta.savedAt)){
   const tok=db.settings.gistToken,gid=db.settings.gistId,aik=db.settings.aiKey,sp=db.settings.syncPass;
   db=d;const fresh=freshDB();db.meta=Object.assign(fresh.meta,db.meta);db.settings=Object.assign(fresh.settings,db.settings||{});
   db.settings.gistToken=db.settings.gistToken||tok;db.settings.gistId=db.settings.gistId||gid;db.settings.aiKey=db.settings.aiKey||aik;db.settings.syncPass=db.settings.syncPass||sp;
   ["products","routes","customers","transactions","invoices","moves","custom"].forEach(k=>{if(!Array.isArray(db[k]))db[k]=[]});
   localStorage.setItem(DB_KEY,JSON.stringify(db));
   LANG=db.settings.lang||"ar";document.documentElement.lang=LANG;document.documentElement.dir=LANG==="ar"?"rtl":"ltr";
   document.documentElement.setAttribute("data-theme",db.settings.theme||"light");
   toast(t("cl_pulled"));go(CUR);
  }else if(!silent)toast(t("cl_uptodate"));
 }catch(e){if(!silent)toast(t("cl_err"),"err")}
}
try{window.addEventListener("online",()=>cloudPull(true));}catch(e){}
