<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0B3B66">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<title>بوابة التوزيع الميدانية</title>
<style>*{box-sizing:border-box;margin:0;padding:0}
:root{--bl:#0B3B66;--bl2:#0A2E52;--cy:#0891B2;--cy2:#0E7490;--ink:#0F172A;--mut:#64748B;--bg:#F1F5F9;--rd:#DC2626;--gn:#16A34A;--am:#D97706}
body{font-family:'Segoe UI',Tahoma,system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
#root{min-height:100vh;display:flex;flex-direction:column}
.inp{width:100%;border:1.5px solid #CBD5E1;border-radius:10px;padding:11px 13px;font:inherit;font-size:.95rem;margin:6px 0;background:#fff}
.inp.n{direction:ltr;text-align:end;font-variant-numeric:tabular-nums}.inp.sm{padding:7px 9px;max-width:110px;margin:0}
textarea.inp{direction:ltr;font-family:monospace;font-size:.8rem}
label{font-size:.82rem;font-weight:700;color:var(--mut);display:block;margin-top:8px}
.btn{border:0;border-radius:11px;padding:12px 20px;font:inherit;font-weight:800;cursor:pointer;color:#fff;background:var(--bl);width:100%;margin-top:10px;transition:filter .12s}
.btn:hover{filter:brightness(1.1)}.btn.bl{background:var(--bl)}.btn.cy{background:var(--cy)}.btn.rd{background:var(--rd)}.btn.gr{background:#94A3B8}
.btn.sm{width:auto;padding:7px 14px;font-size:.82rem;margin-top:6px}.btn.lg{font-size:1.05rem;padding:15px}
.link{background:none;border:0;color:#fff;opacity:.75;cursor:pointer;font:inherit;margin-top:12px;text-decoration:underline}
.mini{font-size:.8rem;color:var(--mut);line-height:1.6;margin:8px 0}
.mini-btn{border:1px solid #CBD5E1;background:#fff;border-radius:8px;padding:4px 10px;cursor:pointer;font:inherit;font-size:.78rem}
/* welcome split */
.welcome{flex:1;display:flex;min-height:100vh}
.welcome.one .pane{flex:1}
.pane{flex:1;display:grid;place-items:center;padding:34px 22px;cursor:pointer;position:relative;overflow:hidden;transition:flex .3s ease;color:#fff}
.pane.mgmt{background:linear-gradient(160deg,#0B3B66,#071F3A 85%)}
.pane.drv{background:linear-gradient(160deg,#0891B2,#065E76 85%)}
.pane:hover{flex:1.25}
.pane::before{content:"";position:absolute;width:420px;height:420px;border-radius:50%;background:rgba(255,255,255,.06);top:-140px;inset-inline-end:-140px}
.pane-in{max-width:380px;text-align:center;position:relative;animation:up .35s ease}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1}}
.logo-big{font-size:52px;margin-bottom:10px}
.pane h1{font-size:1.55rem;font-weight:800}
.pane .sub{opacity:.72;font-size:.86rem;letter-spacing:.06em;margin:2px 0 12px;direction:ltr}
.pane .desc{font-size:.92rem;opacity:.92;line-height:1.7;margin-bottom:16px}
.pane .cta{display:inline-block;background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.35);border-radius:99px;padding:9px 22px;font-weight:800}
.pane .mini{color:rgba(255,255,255,.75)}
@media(max-width:760px){.welcome{flex-direction:column}.pane{min-height:50vh}}
/* app chrome */
.netbar{position:sticky;top:0;z-index:50;text-align:center;font-size:.8rem;font-weight:800;padding:7px 10px;color:#fff}
.netbar span{opacity:.65;font-size:.7rem;direction:ltr;display:inline-block;margin-inline-start:6px}
.netbar.on{background:var(--gn)}.netbar.pending{background:var(--am)}.netbar.off{background:#475569}
.appbar{display:flex;align-items:center;gap:10px;background:#fff;border-bottom:1px solid #E2E8F0;padding:11px 16px}
.appbar b{flex:1;font-size:.95rem}
.tag{background:#E2E8F0;border-radius:99px;padding:3px 12px;font-size:.72rem;font-weight:800;color:#334155}
.tabs{display:flex;gap:6px;overflow-x:auto;background:#fff;padding:8px 12px;border-bottom:1px solid #E2E8F0;position:sticky;top:0;z-index:40}
.tabs button{border:0;background:none;font:inherit;font-weight:800;font-size:.85rem;color:var(--mut);padding:8px 14px;border-radius:9px;cursor:pointer;white-space:nowrap}
.tabs button.on{background:var(--bl);color:#fff}
.wrap{max-width:860px;width:100%;margin:0 auto;padding:18px 14px 90px;flex:1}
h2{font-size:1.15rem;margin:6px 0 12px}h3{font-size:.98rem;margin:18px 0 8px}h4{font-size:.88rem;margin:14px 0 6px;color:var(--bl)}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.cards.two{grid-template-columns:1fr 1fr}
.kc{background:#fff;border-radius:14px;padding:12px 14px;border-top:4px solid var(--bl);box-shadow:0 2px 8px rgba(15,23,42,.06)}
.kc span{font-size:.72rem;font-weight:800;color:var(--mut)}
.kc b{display:block;font-size:1.3rem;direction:ltr;text-align:end;font-variant-numeric:tabular-nums}
.kc.bl{border-color:var(--bl)}.kc.cy{border-color:var(--cy)}.kc.rd{border-color:var(--rd)}.kc.gn{border-color:var(--gn)}.kc.am{border-color:var(--am)}
.trip{background:#fff;border:1px solid #E2E8F0;border-radius:14px;padding:13px 15px;margin-bottom:11px;box-shadow:0 2px 8px rgba(15,23,42,.05)}
.trip.locked{border-inline-start:5px solid var(--rd)}
.trip-h{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.trip-h b{flex:1}.trip-h>span{font-size:.78rem;color:var(--mut)}
.st{border-radius:99px;padding:3px 12px;font-size:.72rem;font-weight:800}
.st.lk{background:#FEE2E2;color:#991B1B}.st.ac{background:#DCFCE7;color:#166534}
.trip-b{font-size:.83rem;color:#334155;margin:8px 0}
details{margin-top:6px}summary{cursor:pointer;font-size:.8rem;font-weight:800;color:var(--bl)}
.mini-row{font-size:.8rem;padding:6px 4px;border-bottom:1px dashed #E2E8F0}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:8px 0}
.row .inp{flex:1;min-width:130px;margin:0}.row .btn{width:auto;margin:0;padding:10px 16px}
.tb{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(15,23,42,.05);font-size:.86rem}
.tb th{background:var(--bl);color:#fff;padding:9px;font-size:.78rem}
.tb td{padding:8px 9px;border-bottom:1px solid #EEF2F7;text-align:center}
.pill{border:0;border-radius:99px;padding:5px 14px;font:inherit;font-size:.75rem;font-weight:800;cursor:pointer}
.pill.ed{background:#DCFCE7;color:#166534}.pill.rd{background:#FEF3C7;color:#92400E}
.ck{font-size:.76rem;font-weight:700;margin-inline-end:10px;white-space:nowrap}
.card{background:#fff;border:1px solid #E2E8F0;border-radius:14px;padding:14px 16px;margin-bottom:12px}
.center{text-align:center;padding:40px 10px}
.center .logo-big{font-size:64px}
.endbox{margin-top:22px;background:#FFF7ED;border:1px solid #FED7AA;border-radius:14px;padding:14px;text-align:center}
.prow{display:flex;align-items:center;gap:10px;justify-content:space-between;padding:5px 0;border-bottom:1px dashed #E2E8F0;font-size:.88rem}
.prow i{font-style:normal;color:var(--mut);font-size:.75rem}
.prow.big{font-weight:800;border-bottom:2px solid #CBD5E1}
.prow.big b{direction:ltr;font-variant-numeric:tabular-nums}
.mback{position:fixed;inset:0;background:rgba(2,6,23,.55);z-index:100;display:grid;place-items:center;padding:12px}
.mcard{background:#fff;border-radius:16px;max-width:520px;width:100%;max-height:92vh;overflow-y:auto;padding:18px 18px 22px}
@media(max-width:600px){.mback{align-items:end;padding:0}.mcard{border-radius:18px 18px 0 0}}
#toast{position:fixed;bottom:18px;inset-inline-start:50%;transform:translateX(50%);z-index:200}
[dir="ltr"] #toast{transform:translateX(-50%)}
.toast{background:var(--gn);color:#fff;border-radius:11px;padding:10px 20px;font-weight:800;font-size:.88rem;animation:up .2s}
.toast.err{background:var(--rd)}
</style>
</head>

<script>/* ======== بوابة التوزيع الميدانية — Field Logistics Portal ======== */
"use strict";
const $=s=>document.querySelector(s),byId=i=>document.getElementById(i);
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const num=v=>{const n=parseFloat(String(v??"").replace(/[,\s]/g,""));return isFinite(n)?n:0};
const money=n=>Number(n||0).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const todayISO=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")};
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const lc=e=>String(e||"").trim().toLowerCase();

/* ---------- pure calculation model (unit-tested) ---------- */
function entryTotals(entry,prodMap){
 let sold=0,ret=0;
 Object.entries(entry.items||{}).forEach(([pid,q])=>{const p=prodMap[pid];if(p)sold+=num(q)*num(p.price);});
 Object.entries(entry.returns||{}).forEach(([pid,q])=>{const p=prodMap[pid];if(p)ret+=num(q)*num(p.returnValue!==undefined?p.returnValue:p.price);});
 return{sold,ret,net:sold-ret,collected:num(entry.collected),debt:num(entry.debt)};
}
function tripTotals(trip,prodMap){
 const t={sold:0,ret:0,net:0,collected:0,debt:0,entries:(trip.entries||[]).length};
 (trip.entries||[]).forEach(e=>{const x=entryTotals(e,prodMap);t.sold+=x.sold;t.ret+=x.ret;t.net+=x.net;t.collected+=x.collected;t.debt+=x.debt;});
 return t;
}
if(typeof window==="undefined"){module.exports={entryTotals,tripTotals};}

/* ---------- config / firebase ---------- */
const CFG_KEY="portal_cfg_v1";
let CFG=null,APP=null,AUTH=null,DB=null,USER=null;
let PRODUCTS=[],USERS=[],TRIPS=[],UNSUBS=[];
const prodMap=()=>{const m={};PRODUCTS.forEach(p=>m[p.id]=p);return m;};
function loadCfg(){
 try{const h=location.hash.match(/#cfg=([A-Za-z0-9+/=_-]+)/);
  if(h){const c=JSON.parse(decodeURIComponent(escape(atob(h[1].replace(/-/g,"+").replace(/_/g,"/")))));localStorage.setItem(CFG_KEY,JSON.stringify(c));history.replaceState(null,"",location.pathname);}
 }catch(e){}
 try{CFG=JSON.parse(localStorage.getItem(CFG_KEY)||"null")}catch(e){CFG=null}
}
function setupLink(){const b=btoa(unescape(encodeURIComponent(JSON.stringify(CFG)))).replace(/\+/g,"-").replace(/\//g,"_");return location.origin+location.pathname+"#cfg="+b;}
function fbInit(){
 APP=FB.initializeApp(CFG.firebase);
 AUTH=FB.getAuth(APP);
 try{DB=FB.initializeFirestore(APP,{localCache:FB.persistentLocalCache({tabManager:FB.persistentMultipleTabManager()})});}
 catch(e){DB=FB.initializeFirestore(APP,{});}
}

/* ---------- connectivity bar ---------- */
let PENDING=false;
function netBar(){
 const el=byId("netbar");if(!el)return;
 const on=navigator.onLine;
 el.className="netbar "+(on?(PENDING?"pending":"on"):"off");
 el.innerHTML=on?(PENDING?"⇅ أونلاين — جارِ المزامنة… <span>Online (Syncing)</span>":"● أونلاين — كل شيء متزامن <span>Online (Synced)</span>")
              :"◌ أوفلاين — الشغل بيتسجل محليًا وهيتزامن أول ما النت يرجع <span>Offline (Working Locally)</span>";
}
if(typeof window!=="undefined"){window.addEventListener("online",netBar);window.addEventListener("offline",netBar);}

/* ---------- screens ---------- */
function show(html){byId("root").innerHTML=html;netBar();}
function toast(msg,err){const r=byId("toast");r.innerHTML=`<div class="toast ${err?"err":""}">${esc(msg)}</div>`;setTimeout(()=>r.innerHTML="",3200);}

/* setup screen (first run: paste firebase config + admin email) */
function parseFirebaseCfg(raw){
  raw=String(raw||"");
  try{
    const j=JSON.parse(raw.trim());
    if(j&&j.apiKey)return j;
  }catch(e){}
  const keys=["apiKey","authDomain","projectId","storageBucket","messagingSenderId","appId","measurementId","databaseURL"];
  const out={};
  keys.forEach(k=>{
    const m=raw.match(new RegExp(k+"\\s*[:=]\\s*[\"']([^\"']+)[\"']"));
    if(m)out[k]=m[1].trim();
  });
  return out;
}

function cfgStatus(){
  const el=byId("su-status");
  if(!el)return null;
  const cfg=parseFirebaseCfg(byId("su-cfg").value);
  const need=["apiKey","authDomain","projectId","appId"];
  const missing=need.filter(k=>!cfg[k]);
  if(!byId("su-cfg").value.trim()){el.innerHTML="";return null;}
  if(missing.length){
    el.innerHTML=`<span class="bad" style="color:#FCA5A5;font-weight:800">✗ لم أتعرف على: ${missing.join("، ")} — الصق كود Firebase كما هو بالظبط</span>`;
    return null;
  }
  el.innerHTML=`<span class="good" style="color:#4ADE80;font-weight:800">✓ تم التعرف على المشروع: <b dir="ltr">${esc(cfg.projectId)}</b></span>`;
  return cfg;
}

function scrSetup(){
  show(`<div class="welcome one">
    <div class="pane mgmt" style="cursor:default">
      <div class="pane-in" style="max-width:560px">
        <div class="logo-big">⚙️</div>
        <h1>إعداد البوابة لأول مرة</h1>
        <p class="sub">من Firebase: Project settings → عند "SDK setup and configuration" اختر Config → <b>انسخ الكود كله زي ما هو والصقه هنا</b></p>
        <textarea class="inp" id="su-cfg" rows="8" dir="ltr" placeholder='const firebaseConfig = {\\n  apiKey: "AIza...",\\n  ...\\n};'></textarea>
        <p class="mini" id="su-status"></p>
        <input class="inp" id="su-admin" dir="ltr" placeholder="إيميل المالك — نفس الإيميل الموجود في قواعد Firestore">
        <button class="btn cy" id="su-go">حفظ وتشغيل البوابة</button>
        <p class="mini">هذه الإعدادات ليست سرًا وتُحفظ على هذا الجهاز فقط.</p>
      </div>
    </div>
  </div>`);
  byId("su-cfg").addEventListener("input",cfgStatus);
  byId("su-go").onclick=()=>{
    const fb=cfgStatus();
    if(!fb)return toast("الصق كود إعدادات Firebase أولًا — لازم يظهر سطر ✓ أخضر","err");
    const admin=lc(byId("su-admin").value);
    if(!admin.includes("@"))return toast("اكتب إيميل المالك (نفس إيميل قواعد الأمان)","err");
    CFG={firebase:fb,adminEmail:admin};
    localStorage.setItem(CFG_KEY,JSON.stringify(CFG));
    location.reload();
  };
}
/* split welcome */
function scrWelcome(){
 show(`<div class="welcome">
  <div class="pane mgmt" onclick="scrLogin('mgmt')">
   <div class="pane-in"><div class="logo-big">🏢</div>
    <h1>الإدارة والشركة</h1><p class="sub">Management & Company</p>
    <p class="desc">لوحة المالك والموظفين: المتابعة الحية، الصلاحيات، الأصناف والأسعار، واعتماد رحلات المندوبين.</p>
    <span class="cta">دخول الإدارة ←</span></div></div>
  <div class="pane drv" onclick="scrLogin('drv')">
   <div class="pane-in"><div class="logo-big">🚚</div>
    <h1>التوصيل والمندوبين</h1><p class="sub">Delivery & Logistics</p>
    <p class="desc">واجهة ميدانية سريعة للموبايل: تسجيل البيع والمرتجعات والتحصيل أثناء الخط — حتى بدون إنترنت.</p>
    <span class="cta">دخول المندوبين ←</span></div></div>
 </div>`);
}
function scrLogin(side){
 const mgmt=side==="mgmt";
 show(`<div class="welcome one"><div class="pane ${mgmt?"mgmt":"drv"}" style="cursor:default">
  <div class="pane-in" style="max-width:440px">
   <div class="logo-big">${mgmt?"🏢":"🚚"}</div>
   <h1>${mgmt?"دخول الإدارة":"دخول المندوبين"}</h1>
   <p class="sub">${mgmt?"Management sign-in":"Driver sign-in"}</p>
   <p class="desc">اكتب إيميلك وهنبعتلك <b>رابط دخول آمن</b> على بريدك — من غير أي كلمات مرور. افتح الرابط من نفس الجهاز وهتدخل فورًا، وهتفضل مسجلًا حتى لو قفلت الصفحة.</p>
   <input class="inp" id="lg-email" type="email" dir="ltr" placeholder="name@email.com" autocomplete="email">
   <button class="btn ${mgmt?"bl":"cy"}" id="lg-send">إرسال رابط الدخول ✉</button>
   <button class="link" onclick="scrWelcome()">→ رجوع</button>
   <p class="mini" id="lg-msg"></p>
  </div></div></div>`);
 byId("lg-send").onclick=async()=>{
  const em=lc(byId("lg-email").value);if(!em.includes("@"))return toast("اكتب إيميل صحيح","err");
  try{
   await FB.sendSignInLinkToEmail(AUTH,em,{url:location.origin+location.pathname,handleCodeInApp:true});
   localStorage.setItem("portal_pending_email",em);
   byId("lg-msg").innerHTML="✓ تم الإرسال — افتح بريدك واضغط على الرابط (شيك على Spam لو ما وصلش).";
  }catch(e){console.warn(e);toast("تعذر الإرسال — تأكد من الإنترنت وأن الدومين مضاف في Firebase Auth","err")}
 };
}

/* ---------- role resolution & live data ---------- */
async function resolveRole(email){
 if(lc(email)===lc(CFG.adminEmail))return{role:"admin",mode:"edit",name:"المالك"};
 const d=await FB.getDoc(FB.doc(DB,"users",lc(email)));
 if(!d.exists())return null;
 return d.data();
}
function listen(){
 UNSUBS.forEach(u=>u());UNSUBS=[];
 UNSUBS.push(FB.onSnapshot(FB.collection(DB,"products"),s=>{PRODUCTS=s.docs.map(d=>({id:d.id,...d.data()}));PENDING=s.metadata.hasPendingWrites;netBar();rerender();},()=>{}));
 if(USER.role==="driver"){
  UNSUBS.push(FB.onSnapshot(FB.query(FB.collection(DB,"trips"),FB.where("driverEmail","==",lc(USER.email))),s=>{TRIPS=s.docs.map(d=>({id:d.id,...d.data()}));PENDING=s.metadata.hasPendingWrites;netBar();rerender();},()=>{}));
 }else{
  UNSUBS.push(FB.onSnapshot(FB.collection(DB,"trips"),s=>{TRIPS=s.docs.map(d=>({id:d.id,...d.data()}));PENDING=s.metadata.hasPendingWrites;netBar();rerender();},()=>{}));
  UNSUBS.push(FB.onSnapshot(FB.collection(DB,"users"),s=>{USERS=s.docs.map(d=>({id:d.id,...d.data()}));rerender();},()=>{}));
 }
}
let VIEW="dash";
function rerender(){if(!USER)return;USER.role==="driver"?drvRender():admRender();}
const canEdit=sec=>USER.role==="admin"||(USER.role==="staff"&&((USER.sections||{})[sec]===true||((USER.sections||{})[sec]===undefined&&USER.mode==="edit")));

/* ---------- ADMIN / STAFF ---------- */
function shell(inner,nav){
 return`<div class="netbar" id="netbar"></div>
 <div class="appbar"><b>${USER.role==="admin"?"👑 ":""}${esc(USER.name||USER.email)}</b>
  <span class="tag">${USER.role==="admin"?"الحساب الرئيسي":USER.role==="staff"?(USER.mode==="edit"?"موظف — تعديل":"موظف — قراءة فقط"):"مندوب"}</span>
  <button class="mini-btn" onclick="doLogout()">خروج ⎋</button></div>
 ${nav||""}<div class="wrap">${inner}</div>`;
}
function admRender(){
 const tabs=[["dash","اللوحة الحية"],["journeys","الرحلات والاعتماد"],["catalog","الأصناف والأسعار"],["users","الصلاحيات والمندوبين"],["settings","الإعدادات"]];
 const nav=`<div class="tabs">${tabs.map(([k,l])=>`<button class="${VIEW===k?"on":""}" onclick="VIEW='${k}';admRender()">${l}</button>`).join("")}</div>`;
 const body=VIEW==="dash"?admDash():VIEW==="journeys"?admJourneys():VIEW==="catalog"?admCatalog():VIEW==="users"?admUsers():admSettings();
 show(shell(body,nav));
}
function admDash(){
 const pm=prodMap();const today=todayISO();
 const tToday=TRIPS.filter(t=>t.date===today);
 const g={sold:0,ret:0,net:0,collected:0,debt:0};
 tToday.forEach(t=>{const x=tripTotals(t,pm);g.sold+=x.sold;g.ret+=x.ret;g.net+=x.net;g.collected+=x.collected;g.debt+=x.debt;});
 return`<h2>لوحة المخزن الحية — ${today}</h2>
 <div class="cards">
  <div class="kc bl"><span>إجمالي البيع اليوم</span><b>${money(g.sold)}</b></div>
  <div class="kc rd"><span>قيمة المرتجعات</span><b>${money(g.ret)}</b></div>
  <div class="kc gn"><span>الصافي</span><b>${money(g.net)}</b></div>
  <div class="kc cy"><span>المحصل نقدًا</span><b>${money(g.collected)}</b></div>
  <div class="kc am"><span>شكك جديدة</span><b>${money(g.debt)}</b></div>
 </div>
 <h3>رحلات اليوم (تتحدث لحظيًا)</h3>
 ${tToday.length?tToday.map(t=>tripCard(t,pm)).join(""):`<p class="mini">لا توجد رحلات اليوم بعد — أول ما مندوب يبدأ تسجيل هتظهر هنا فورًا.</p>`}`;
}
function tripCard(t,pm){
 const x=tripTotals(t,pm);
 return`<div class="trip ${t.status==="locked"?"locked":""}">
  <div class="trip-h"><b>🚚 ${esc(t.driverName||t.driverEmail)}</b><span>${esc(t.date)}</span>
   <span class="st ${t.status==="locked"?"lk":"ac"}">${t.status==="locked"?"🔒 منتهية (مقفولة)":"🟢 شغالة الآن"}</span></div>
  <div class="trip-b">بائعون: <b>${x.entries}</b> · بيع: <b>${money(x.sold)}</b> · مرتجع: <b>${money(x.ret)}</b> · صافي: <b>${money(x.net)}</b> · محصل: <b>${money(x.collected)}</b> · شكك: <b>${money(x.debt)}</b></div>
  ${t.status==="locked"&&canEdit("trips")?`<button class="btn sm cy" onclick="reopenTrip('${t.id}')">🔓 إعادة فتح للمندوب (Reopen)</button>`:""}
  <details><summary>تفاصيل البائعين</summary>${(t.entries||[]).map(e=>{const et=entryTotals(e,pm);
   return`<div class="mini-row"><b>${esc(e.sellerName)}</b> — ${esc(e.place||"")} · بيع ${money(et.sold)} · مرتجع ${money(et.ret)} · محصل ${money(et.collected)} · شكك ${money(et.debt)}</div>`}).join("")||"<p class='mini'>لا يوجد</p>"}</details>
 </div>`;
}
function admJourneys(){
 const pm=prodMap();
 const locked=TRIPS.filter(t=>t.status==="locked").sort((a,b)=>String(b.date).localeCompare(a.date));
 const active=TRIPS.filter(t=>t.status==="active").sort((a,b)=>String(b.date).localeCompare(a.date));
 return`<h2>طابور الاعتماد وإعادة الفتح</h2>
 <p class="mini">أي رحلة ضغط فيها المندوب «انتهت الرحلة» بتتقفل من عنده وتظهر هنا. لو قفلها بالغلط اضغط «إعادة فتح» وهترجع له قابلة للتعديل فورًا على جهازه.</p>
 <h3>🔒 رحلات منتهية (${locked.length})</h3>${locked.map(t=>tripCard(t,pm)).join("")||"<p class='mini'>لا يوجد</p>"}
 <h3>🟢 رحلات شغالة (${active.length})</h3>${active.map(t=>tripCard(t,pm)).join("")||"<p class='mini'>لا يوجد</p>"}`;
}
async function reopenTrip(id){try{await FB.updateDoc(FB.doc(DB,"trips",id),{status:"active",reopenedAt:FB.serverTimestamp()});toast("تم إعادة الفتح — المندوب يقدر يعدل الآن ✓")}catch(e){toast("تعذر — تأكد من الصلاحيات","err")}}
function admCatalog(){
 const ce=canEdit("catalog");
 return`<h2>الأصناف والأسعار وقيم المرتجع</h2>
 <p class="mini">أي إضافة أو تعديل هنا يُحدّث حسابات كل المندوبين لحظيًا.</p>
 ${ce?`<div class="row"><input class="inp" id="pc-name" placeholder="اسم الصنف"><input class="inp n" id="pc-price" type="number" step="any" placeholder="سعر البيع"><input class="inp n" id="pc-ret" type="number" step="any" placeholder="قيمة المرتجع"><button class="btn bl" onclick="prodAdd()">+ إضافة</button></div>`:""}
 <table class="tb"><tr><th>الصنف</th><th>سعر البيع</th><th>قيمة المرتجع</th>${ce?"<th></th>":""}</tr>
 ${PRODUCTS.map(p=>`<tr><td>${esc(p.name)}</td>
  <td>${ce?`<input class="inp n sm" type="number" step="any" value="${num(p.price)}" onchange="prodUpd('${p.id}','price',this.value)">`:money(p.price)}</td>
  <td>${ce?`<input class="inp n sm" type="number" step="any" value="${num(p.returnValue!==undefined?p.returnValue:p.price)}" onchange="prodUpd('${p.id}','returnValue',this.value)">`:money(p.returnValue!==undefined?p.returnValue:p.price)}</td>
  ${ce?`<td><button class="mini-btn" onclick="prodDel('${p.id}')">🗑</button></td>`:""}</tr>`).join("")}
 </table>`;
}
async function prodAdd(){const n=byId("pc-name").value.trim();if(!n)return toast("اكتب اسم الصنف","err");
 try{await FB.setDoc(FB.doc(DB,"products",uid()),{name:n,price:num(byId("pc-price").value),returnValue:num(byId("pc-ret").value)||num(byId("pc-price").value)});toast("تمت الإضافة ✓")}catch(e){toast("تعذر — صلاحيات؟","err")}}
async function prodUpd(id,k,v){try{await FB.updateDoc(FB.doc(DB,"products",id),{[k]:num(v)})}catch(e){toast("تعذر التعديل","err")}}
async function prodDel(id){if(!confirm("حذف الصنف نهائيًا؟"))return;try{await FB.deleteDoc(FB.doc(DB,"products",id))}catch(e){toast("تعذر الحذف","err")}}
function admUsers(){
 const isA=USER.role==="admin";
 const staff=USERS.filter(u=>u.role==="staff"),drivers=USERS.filter(u=>u.role==="driver");
 const secBox=(u,s,label)=>`<label class="ck"><input type="checkbox" ${((u.sections||{})[s]===true)||((u.sections||{})[s]===undefined&&u.mode==="edit")?"checked":""} ${isA?"":"disabled"} onchange="userSec('${u.id}','${s}',this.checked)">${label}</label>`;
 return`<h2>الصلاحيات — موظفون ومندوبون</h2>
 ${isA?`<div class="row"><input class="inp" id="us-em" dir="ltr" placeholder="email@..."><input class="inp" id="us-name" placeholder="الاسم (مثال: أحمد)"><select class="inp" id="us-role"><option value="driver">مندوب توصيل</option><option value="staff">موظف إدارة</option></select><select class="inp" id="us-mode"><option value="edit">تعديل</option><option value="read">قراءة فقط</option></select><button class="btn bl" onclick="userAdd()">+ إضافة</button></div>
 <p class="mini">أضف إيميل الشخص هنا أولًا (Whitelist) — بدونها رابط الدخول يوصله لكن البوابة ترفضه.</p>`:""}
 <h3>👔 الموظفون (${staff.length})</h3>
 <table class="tb"><tr><th>الاسم</th><th>الإيميل</th><th>الوضع العام</th><th>صلاحيات الأقسام</th>${isA?"<th></th>":""}</tr>
 ${staff.map(u=>`<tr><td>${esc(u.name||"")}</td><td dir="ltr">${esc(u.id)}</td>
  <td><button class="pill ${u.mode==="edit"?"ed":"rd"}" ${isA?`onclick="userMode('${u.id}','${u.mode==="edit"?"read":"edit"}')"`:""}>${u.mode==="edit"?"تعديل ✎":"قراءة فقط 👁"}</button></td>
  <td>${secBox(u,"catalog","الأصناف")} ${secBox(u,"trips","الرحلات")}</td>
  ${isA?`<td><button class="mini-btn" onclick="userDel('${u.id}')">🗑</button></td>`:""}</tr>`).join("")||""}
 </table>
 <h3>🚚 المندوبون (${drivers.length})</h3>
 <table class="tb"><tr><th>الاسم</th><th>الإيميل</th><th>الحالة</th>${isA?"<th></th>":""}</tr>
 ${drivers.map(u=>`<tr><td>${esc(u.name||"")}${isA?` <button class="mini-btn" onclick="userRename('${u.id}')">✎</button>`:""}</td><td dir="ltr">${esc(u.id)}</td>
  <td><button class="pill ${u.mode!=="read"?"ed":"rd"}" ${isA?`onclick="userMode('${u.id}','${u.mode!=="read"?"read":"edit"}')"`:""}>${u.mode!=="read"?"نشط ✓":"موقوف ⏸"}</button></td>
  ${isA?`<td><button class="mini-btn" onclick="userDel('${u.id}')">🗑</button></td>`:""}</tr>`).join("")||""}
 </table>`;
}
async function userAdd(){const em=lc(byId("us-em").value);if(!em.includes("@"))return toast("إيميل غير صحيح","err");
 try{await FB.setDoc(FB.doc(DB,"users",em),{role:byId("us-role").value,mode:byId("us-mode").value,name:byId("us-name").value.trim(),sections:{}});toast("تمت الإضافة ✓")}catch(e){toast("تعذر — المالك فقط","err")}}
async function userMode(id,m){try{await FB.updateDoc(FB.doc(DB,"users",id),{mode:m})}catch(e){toast("تعذر","err")}}
async function userSec(id,s,v){try{await FB.updateDoc(FB.doc(DB,"users",id),{["sections."+s]:v})}catch(e){toast("تعذر","err")}}
async function userDel(id){if(!confirm("إزالة "+id+" من الصلاحيات؟"))return;try{await FB.deleteDoc(FB.doc(DB,"users",id))}catch(e){toast("تعذر","err")}}
async function userRename(id){const n=prompt("اسم المندوب الجديد:");if(!n)return;try{await FB.updateDoc(FB.doc(DB,"users",id),{name:n.trim()})}catch(e){toast("تعذر","err")}}

/* ---------- DRIVER ---------- */
function myTrip(){return TRIPS.find(t=>t.date===todayISO())||null;}
function drvRender(){
 const t=myTrip();const pm=prodMap();
 let body;
 if(!t)body=`<div class="center"><div class="logo-big">🚚</div><h2>أهلًا ${esc(USER.name||"")} 👋</h2>
  <p class="mini">جاهز تبدأ خط النهارده؟ كل اللي هتسجله بيتحسب لوحده وبيوصل للإدارة لحظيًا — وشغال حتى من غير نت.</p>
  <button class="btn cy lg" onclick="tripStart()">🚀 بدء رحلة اليوم</button></div>`;
 else if(t.status==="locked")body=drvLocked(t,pm);
 else body=drvActive(t,pm);
 show(shell(body));
}
async function tripStart(){
 try{await FB.setDoc(FB.doc(DB,"trips",lc(USER.email).replace(/[^a-z0-9@._-]/g,"")+"_"+todayISO()),{driverEmail:lc(USER.email),driverName:USER.name||USER.email,date:todayISO(),status:"active",entries:[],createdAt:FB.serverTimestamp()});}
 catch(e){toast("تعذر البدء — اتأكد إن إيميلك مضاف عند الإدارة","err")}
}
function drvActive(t,pm){
 const x=tripTotals(t,pm);
 return`<h2>رحلة اليوم — ${t.date} 🟢</h2>
 <div class="cards two">
  <div class="kc cy"><span>إجمالي البيع</span><b>${money(x.sold)}</b></div>
  <div class="kc rd"><span>المرتجعات</span><b>${money(x.ret)}</b></div>
  <div class="kc gn"><span>الصافي</span><b>${money(x.net)}</b></div>
  <div class="kc am"><span>محصل / شكك</span><b>${money(x.collected)} / ${money(x.debt)}</b></div>
 </div>
 <button class="btn cy lg" onclick="entryForm(-1)">+ إضافة بائع جديد</button>
 ${(t.entries||[]).map((e,i)=>{const et=entryTotals(e,pm);
  return`<div class="trip"><div class="trip-h"><b>${esc(e.sellerName)}</b><span>${esc(e.place||"")}</span></div>
  <div class="trip-b">بيع: <b>${money(et.sold)}</b> · مرتجع: <b>${money(et.ret)}</b> · محصل: <b>${money(et.collected)}</b> · شكك: <b>${money(et.debt)}</b></div>
  <div class="row"><button class="btn sm bl" onclick="entryForm(${i})">✎ تعديل</button><button class="btn sm rd" onclick="entryDel(${i})">حذف</button></div></div>`}).join("")}
 <div class="endbox"><p class="mini">خلصت الخط؟ بعد القفل مش هتقدر تعدّل — ولو حصل غلط، الإدارة تقدر تعيد الفتح لك فورًا.</p>
 <button class="btn rd lg" onclick="tripLock()">🔒 انتهت الرحلة / تسليم الشيفت</button></div>`;
}
function drvLocked(t,pm){
 const x=tripTotals(t,pm);
 return`<div class="center"><div class="logo-big">🔒</div><h2>الرحلة اتسلمت — شكرًا ${esc(USER.name||"")} ✓</h2>
 <p class="mini">التقرير مقفول للقراءة فقط. لو في تصحيح، كلم الإدارة وهما يعيدوا فتحه لك من عندهم — هيفتح على جهازك تلقائيًا في لحظتها.</p>
 <div class="cards two">
  <div class="kc cy"><span>إجمالي البيع</span><b>${money(x.sold)}</b></div>
  <div class="kc rd"><span>المرتجعات</span><b>${money(x.ret)}</b></div>
  <div class="kc gn"><span>الصافي</span><b>${money(x.net)}</b></div>
  <div class="kc am"><span>محصل / شكك</span><b>${money(x.collected)} / ${money(x.debt)}</b></div>
 </div></div>`;
}
function entryForm(i){
 const t=myTrip();if(!t||t.status!=="active")return;
 const e=i>=0?t.entries[i]:{sellerName:"",place:"",items:{},returns:{},collected:0,debt:0};
 byId("modal").innerHTML=`<div class="mback" onclick="if(event.target===this)byId('modal').innerHTML=''">
 <div class="mcard"><h3>${i>=0?"تعديل بائع":"بائع جديد"}</h3>
  <label>اسم البائع *</label><input class="inp" id="ef-name" value="${esc(e.sellerName)}">
  <label>المكان / البلد</label><input class="inp" id="ef-place" value="${esc(e.place||"")}">
  <h4>🛒 المبيع (الكمية × السعر تلقائي)</h4>
  ${PRODUCTS.map(p=>`<div class="prow"><span>${esc(p.name)} <i>${money(p.price)}</i></span><input class="inp n sm" type="number" min="0" inputmode="numeric" placeholder="0" value="${num((e.items||{})[p.id])||""}" data-sold="${p.id}" oninput="efCalc()"></div>`).join("")}
  <h4>↩ المرتجعات للمخزن</h4>
  ${PRODUCTS.map(p=>`<div class="prow"><span>${esc(p.name)} <i>${money(p.returnValue!==undefined?p.returnValue:p.price)}</i></span><input class="inp n sm" type="number" min="0" inputmode="numeric" placeholder="0" value="${num((e.returns||{})[p.id])||""}" data-ret="${p.id}" oninput="efCalc()"></div>`).join("")}
  <div class="prow big"><span>إجمالي البيع</span><b id="ef-sold">0.00</b></div>
  <div class="prow big"><span>قيمة المرتجع</span><b id="ef-ret">0.00</b></div>
  <div class="prow big"><span>الصافي المطلوب</span><b id="ef-net">0.00</b></div>
  <label>💵 المحصل نقدًا</label><input class="inp n" id="ef-col" type="number" min="0" step="any" inputmode="decimal" value="${num(e.collected)||""}" oninput="efCalc()">
  <label>📒 شكك (باقي على البائع)</label><input class="inp n" id="ef-debt" type="number" min="0" step="any" inputmode="decimal" value="${num(e.debt)||""}">
  <button class="mini-btn" style="margin:4px 0 10px" onclick="byId('ef-debt').value=Math.max(0,num(byId('ef-net').textContent.replace(/,/g,''))-num(byId('ef-col').value)).toFixed(2)">احسب الشكك تلقائيًا (الصافي − المحصل)</button>
  <div class="row"><button class="btn cy" onclick="entrySave(${i})">حفظ ✓</button><button class="btn gr" onclick="byId('modal').innerHTML=''">إلغاء</button></div>
 </div></div>`;
 efCalc();
}
function efCalc(){
 const pm=prodMap();let sold=0,ret=0;
 document.querySelectorAll("[data-sold]").forEach(el=>{const p=pm[el.dataset.sold];if(p)sold+=num(el.value)*num(p.price);});
 document.querySelectorAll("[data-ret]").forEach(el=>{const p=pm[el.dataset.ret];if(p)ret+=num(el.value)*num(p.returnValue!==undefined?p.returnValue:p.price);});
 byId("ef-sold").textContent=money(sold);byId("ef-ret").textContent=money(ret);byId("ef-net").textContent=money(sold-ret);
}
async function entrySave(i){
 const t=myTrip();if(!t)return;
 const name=byId("ef-name").value.trim();if(!name)return toast("اكتب اسم البائع","err");
 const items={},returns={};
 document.querySelectorAll("[data-sold]").forEach(el=>{if(num(el.value))items[el.dataset.sold]=num(el.value)});
 document.querySelectorAll("[data-ret]").forEach(el=>{if(num(el.value))returns[el.dataset.ret]=num(el.value)});
 const entry={id:i>=0?t.entries[i].id:uid(),sellerName:name,place:byId("ef-place").value.trim(),items,returns,collected:num(byId("ef-col").value),debt:num(byId("ef-debt").value)};
 const entries=t.entries.slice();if(i>=0)entries[i]=entry;else entries.push(entry);
 try{await FB.updateDoc(FB.doc(DB,"trips",t.id),{entries,updatedAt:FB.serverTimestamp()});byId("modal").innerHTML="";toast("اتسجل ✓ "+(navigator.onLine?"":"(محليًا — هيتزامن مع النت)"));}
 catch(e){toast("تعذر الحفظ","err")}
}
async function entryDel(i){const t=myTrip();if(!t||!confirm("حذف هذا البائع من الرحلة؟"))return;
 const entries=t.entries.slice();entries.splice(i,1);
 try{await FB.updateDoc(FB.doc(DB,"trips",t.id),{entries,updatedAt:FB.serverTimestamp()})}catch(e){toast("تعذر","err")}}
async function tripLock(){const t=myTrip();if(!t||!confirm("تأكيد إنهاء الرحلة؟ بعدها التقرير يقفل من عندك."))return;
 try{await FB.updateDoc(FB.doc(DB,"trips",t.id),{status:"locked",lockedAt:FB.serverTimestamp()})}catch(e){toast("تعذر","err")}}

/* ---------- auth glue ---------- */
async function doLogout(){UNSUBS.forEach(u=>u());UNSUBS=[];USER=null;await FB.signOut(AUTH);scrWelcome();}
async function main(){
 loadCfg();
 if(!CFG){scrSetup();return;}
 fbInit();
 if(FB.isSignInWithEmailLink(AUTH,location.href)){
  let em=localStorage.getItem("portal_pending_email")||prompt("أكد إيميلك للدخول:");
  try{await FB.signInWithEmailLink(AUTH,lc(em),location.href);history.replaceState(null,"",location.pathname);}
  catch(e){toast("تعذر إتمام الدخول — أعد إرسال الرابط","err")}
 }
 FB.onAuthStateChanged(AUTH,async u=>{
  if(!u||!u.email){USER=null;scrWelcome();return;}
  const r=await resolveRole(u.email).catch(()=>null);
  if(!r){show(`<div class="welcome one"><div class="pane mgmt" style="cursor:default"><div class="pane-in">
   <div class="logo-big">🚫</div><h1>غير مصرح</h1><p class="desc" dir="ltr">${esc(u.email)}</p>
   <p class="desc">إيميلك مش مضاف في جدول الصلاحيات — كلم الإدارة يضيفوك، ثم اضغط تحديث.</p>
   <button class="btn bl" onclick="location.reload()">تحديث</button><button class="link" onclick="doLogout()">خروج</button></div></div></div>`);return;}
  USER={email:u.email,...r};VIEW="dash";listen();rerender();
 });
}
if(typeof document!=="undefined")document.addEventListener("DOMContentLoaded",()=>{
 main();
 if("serviceWorker" in navigator&&location.protocol.startsWith("http")){navigator.serviceWorker.register("./sw.js").catch(()=>{});}
});
</script>
